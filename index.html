<head>

<title>🏥 Klinik unter Belagerung / House of God TD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Figtree:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#e8ece9;font-family:'Figtree',sans-serif;overflow:hidden;height:100%;height:100dvh;width:100%;display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none;touch-action:manipulation;-webkit-touch-callout:none}
#hud{display:flex;align-items:center;justify-content:center;width:100%;padding:5px 6px;color:#3a4a5c;z-index:10;gap:5px;flex-shrink:0;flex-wrap:wrap}
.st{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600;background:rgba(0,0,0,0.06);padding:2px 8px;border-radius:14px;white-space:nowrap}
.st .ic{font-size:13px}
#gc{position:relative;flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{display:block;border-radius:6px}
#tp{display:flex;gap:4px;padding:5px 6px;width:100%;justify-content:center;flex-shrink:0;flex-wrap:wrap;max-width:440px;margin:0 auto}
.tb{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.04);border:2px solid rgba(0,0,0,0.08);border-radius:10px;padding:4px 4px 3px;color:#3a4a5c;cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif;min-width:48px;width:calc(16.6% - 4px);flex-shrink:0;-webkit-tap-highlight-color:transparent;position:relative}
.tb:active{transform:scale(.93)}
.tb.sel{background:rgba(45,106,106,0.18);border-color:#2D6A6A;box-shadow:0 0 10px rgba(45,106,106,0.25)}
.tb.dis{opacity:.3;pointer-events:none}
.tb.locked{opacity:.18;pointer-events:none}
.tb.offlined{opacity:.35;pointer-events:none;border-color:rgba(200,80,50,.3);background:rgba(200,80,50,.06)}
.tb .em{font-size:22px;line-height:1}
.tb .nm{font-size:7px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tb .ct{font-size:8px;opacity:.7;font-weight:600}
.tb .lk{position:absolute;top:-2px;right:-2px;font-size:9px;background:#c8cdd2;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
#ib{display:none!important}
#wa{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Figtree',sans-serif;font-size:24px;font-weight:700;color:#2a3a4a;text-shadow:0 0 20px rgba(45,106,106,.4),0 1px 0 #fff;pointer-events:none;opacity:0;transition:opacity .4s;z-index:20;white-space:nowrap;letter-spacing:.5px}
#wa.show{opacity:1}
#intro-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);width:85%;max-width:340px;display:flex;flex-direction:column;align-items:center;background:#fff;z-index:70;color:#3a4a5c;padding:22px 18px 16px;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);border-left:5px solid #2D6A6A}
#intro-card.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
#intro-card.threat{border-left-color:#c0392b}
#intro-card .ic-emoji{font-size:48px;margin-bottom:6px;filter:drop-shadow(0 0 8px rgba(0,0,0,.08))}
#intro-card .ic-type{font-family:'Figtree',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;padding:2px 10px;border-radius:8px;display:inline-block}
#intro-card .ic-type.equip-type{color:#2D6A6A;background:rgba(45,106,106,.1)}
#intro-card .ic-type.threat-type{color:#c0392b;background:rgba(192,57,43,.1)}
#intro-card .ic-type.crisis-type{color:#b06000;background:rgba(200,120,30,.12)}
#intro-card .ic-name{font-family:'Figtree',sans-serif;font-size:22px;font-weight:700;color:#2a3a4a;margin-bottom:5px}
#intro-card .ic-quote{font-family:'Special Elite',monospace;font-size:12px;color:#6a5a48;line-height:1.5;max-width:290px;margin-bottom:5px;font-style:italic}
#intro-card .ic-stats{font-size:10px;opacity:.5;margin-bottom:10px;color:#5a6a7c}
#intro-card .ic-dismiss{font-size:10px;opacity:.3;animation:pulse 2s infinite;color:#5a6a7c}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.6}}
#mutator-bar{position:absolute;top:4px;left:4px;right:40px;z-index:12;display:none;flex-wrap:wrap;gap:3px;padding:0}
.mut-pill{display:inline-block;font-family:'Figtree',sans-serif;font-size:10px;font-weight:600;letter-spacing:.3px;color:#a03030;background:rgba(200,50,50,.1);padding:2px 7px;border-radius:10px;border:1px solid rgba(200,50,50,.2);white-space:nowrap;line-height:1.4}
.mut-pill.disable{color:#b06000;background:rgba(200,120,30,.1);border-color:rgba(200,120,30,.2)}
.ov{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(232,236,233,.97);z-index:50;color:#3a4a5c;padding:16px;text-align:center;overflow-y:auto}
.ov.hid{display:none}
.hid{display:none!important}
body:has(.ov:not(.hid)) #hud,body:has(.ov:not(.hid)) #tp,body:has(.ov:not(.hid)) #ib{visibility:hidden;height:0;padding:0;overflow:hidden;flex:0}
.bt{font-family:'Figtree',sans-serif;font-size:26px;font-weight:700;text-shadow:none;line-height:1.3;letter-spacing:.5px;color:#2a3a4a}
.st2{font-size:12px;opacity:.7;margin:6px 0 10px;font-family:'Figtree',sans-serif;max-width:320px;line-height:1.5;color:#4a5a6c}
.st2 em{color:#b03030;font-style:normal}
.laws-box{font-family:'Special Elite',monospace;font-size:9px;color:#6a5a48;line-height:1.7;max-width:310px;text-align:left;margin:8px auto 14px;padding:10px;background:rgba(0,0,0,.03);border-radius:8px;border:1px solid rgba(0,0,0,.06);max-height:200px;overflow-y:auto}
.laws-box span{color:#8a5a30}
.pbtn{font-family:'Figtree',sans-serif;font-size:15px;font-weight:700;padding:9px 28px;border-radius:25px;border:none;background:linear-gradient(135deg,#2D6A6A,#1a4a4a);color:#fff;cursor:pointer;box-shadow:0 3px 15px rgba(45,106,106,.25);-webkit-tap-highlight-color:transparent;margin:4px}
.pbtn:active{transform:scale(.96)}
.pbtn.lang{font-size:13px;padding:7px 20px;background:rgba(0,0,0,.05);color:#3a4a5c;box-shadow:none;border:1px solid rgba(0,0,0,.12)}
.pbtn.lang:hover,.pbtn.lang.active{background:rgba(45,106,106,.15);border-color:#2D6A6A;color:#2D6A6A}
.lang-row{display:flex;gap:8px;margin-bottom:12px}
#sb{position:absolute;top:5px;right:5px;z-index:15;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.1);border-radius:7px;color:#3a4a5c;font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:4px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#cf{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .3s;z-index:18;font-size:16px;font-family:'Figtree',sans-serif;font-weight:700;color:#b08a00;text-shadow:0 0 10px rgba(180,140,0,.3)}
#cf.show{opacity:1}
#law{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:'Special Elite',monospace;font-size:9px;color:rgba(60,70,80,.18);pointer-events:none;z-index:5;white-space:nowrap;letter-spacing:.5px;max-width:95%;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div id="hud">
  <div class="st"><span class="ic">💰</span><span id="gd">80</span></div>
  <div class="st"><span class="ic">📟</span><span id="wd-label">Shift</span> <span id="wd">0</span></div>
  <div class="st"><span class="ic">❤️</span><span id="ld">20</span></div>
  <div class="st"><span class="ic">📋</span><span id="sd">0</span></div>
</div>
<div id="gc">
  <canvas id="cv"></canvas>
  <div id="wa"></div>
  <div id="cf"></div>
  <div id="mutator-bar"></div>
  <button id="sb">⏩1x</button>
  <button id="pb" style="position:absolute;top:5px;right:55px;z-index:15;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.1);border-radius:7px;color:#3a4a5c;font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;padding:4px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent">⏸️</button>
  <div id="law"></div>
  <div id="tp-backdrop" onclick="closeTowerPanel()" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.2);z-index:24"></div>
  <div id="tower-panel" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:25;background:#fff;border-top:1px solid rgba(0,0,0,.08);border-radius:16px 16px 0 0;padding:12px 16px 16px;font-family:'Figtree',sans-serif;box-shadow:0 -4px 30px rgba(0,0,0,.1);max-width:400px;margin:0 auto">
    <div style="width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:0 auto 10px"></div>
    <div id="tp-header" style="font-size:18px;font-weight:700;color:#2a3a4a;margin-bottom:2px"></div>
    <div id="tp-desc" style="font-size:11px;color:#8a9aac;margin-bottom:8px"></div>
    <div id="tp-stats" style="display:flex;gap:12px;justify-content:center;margin-bottom:10px;font-size:12px;color:#5a6a7c"></div>
    <div id="tp-buttons" style="display:flex;gap:8px;justify-content:center"></div>
  </div>
  <div id="intro-card">
    <div class="ic-emoji" id="ic-emoji"></div>
    <div class="ic-type" id="ic-type"></div>
    <div class="ic-name" id="ic-name"></div>
    <div class="ic-quote" id="ic-quote"></div>
    <div class="ic-stats" id="ic-stats"></div>
    <div class="ic-dismiss" id="ic-dismiss">tap anywhere to continue</div>
  </div>
  <div id="shift-card" class="hid" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:55;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(232,236,233,.97);padding:20px;text-align:center">
    <div style="background:#2D6A6A;color:#fff;padding:8px 28px;border-radius:20px;font-family:'Figtree',sans-serif;font-weight:700;font-size:20px;margin-bottom:14px;letter-spacing:.5px" id="sc-title"></div>
    <div id="sc-narrative" style="font-family:'Special Elite',monospace;font-size:13px;color:#5a6a7c;max-width:280px;margin:0 auto 16px;line-height:1.6;font-style:italic"></div>
    <div id="sc-status" style="display:flex;gap:12px;justify-content:center;margin-bottom:14px;font-family:'Figtree',sans-serif;font-size:13px">
      <div id="sc-gold" style="background:rgba(0,0,0,.05);padding:4px 12px;border-radius:10px;color:#3a4a5c;font-weight:600"></div>
      <div id="sc-upkeep" style="background:rgba(180,40,40,.08);padding:4px 12px;border-radius:10px;color:#b03030;font-weight:600"></div>
    </div>
    <div id="sc-mutators" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:0 0 12px;max-width:300px"></div>
    <div id="sc-tutorial" style="font-size:11px;color:#2D6A6A;max-width:280px;margin:0 auto 14px;background:rgba(45,106,106,.06);padding:8px 12px;border-radius:10px;display:none;line-height:1.5"></div>
    <button class="pbtn" onclick="dismissShiftCard()" style="font-size:18px;padding:12px 40px;border-radius:20px">▶️</button>
  </div>
  <div class="ov" id="ss" style="position:fixed;z-index:100">
    <div class="bt" id="ss-title">🏥</div>
    <div class="st2" id="ss-desc"></div>
    <div class="lang-row">
      <button class="pbtn lang" onclick="setLang('en')">🇺🇸 English</button>
      <button class="pbtn lang active" onclick="setLang('de')">🇩🇪 Deutsch</button>
    </div>
    <button class="pbtn" id="ss-play" onclick="startGame()">🩺</button>
  </div>
  <div class="ov hid" id="go" style="position:fixed;z-index:100">>
    <div class="bt" id="go-title">💀</div>
    <div class="st2" id="go-desc"></div>
    <button class="pbtn" id="go-share" onclick="generateScorecard()" style="background:linear-gradient(135deg,#e17055,#c0392b);margin-bottom:4px">📸</button>
    <button class="pbtn" id="go-play" onclick="startGame()">📟</button>
  </div>
</div>
<div id="tp"></div>
<div id="ib"></div>

<script>
// ══════════════════════════════════════════
//  LANGUAGE SYSTEM
// ══════════════════════════════════════════
let lang='de';

const TX={
en:{
  title:'🏥 HOUSE OF GOD\nTOWER DEFENSE',
  desc:'<em>July 1st.</em> The worst day in American medicine. Every teaching hospital fills with new interns who don\'t know what they\'re doing.<br><br>You are one of them.<br><br>They\'re coming — the <em>gomers</em>, the LOLs, the bounce-backs, the suits. Your only weapons: the hospital\'s equipment, turned against the endless tide.<br><br>Place equipment along the corridor. Combine adjacent equipment for synergies. New equipment unlocks as you survive.',
  laws_title:'THE LAWS OF THE HOUSE OF GOD:',
  laws:["I. Gomers don't leave.","II. Gomers go to ground.","III. At a cardiac arrest, the first procedure is to take your own pulse.","IV. The patient is the one with the disease.","V. Placement comes first.","VI. There is no body cavity that cannot be reached with a #14 needle and a good strong arm.","VII. Age + BUN = Lasix dose.","VIII. They can always hurt you more.","IX. The only good admission is a cancelled admission.","X. If you don't take a temperature, you can't find a fever.","XI. Show me a BMS who only triples my work and I will kiss his feet.","XII. If the radiology resident and the BMS both see a lesion on the chest X-ray, there can be no lesion there.","XIII. The delivery of good medical care is to do as much nothing as possible."],
  play:'🩺 Begin Internship', shift:'Shift', go_title:'🚨 SHIFT OVER',
  go_desc:(w,s,q)=>`You survived ${w} shifts.<br>Score: ${s}<br><br><em>${q}</em>`,
  go_play:'📟 New Rotation', dismiss:'tap anywhere to continue',
  share:'📸 Share Score', sc_title:'HOUSE OF GOD TOWER DEFENSE', sc_survived:'Survived', sc_shifts:'shifts', sc_score:'Score', sc_top:'Top Tower', sc_quote:'Words of wisdom', sc_cta:'Can you survive longer?',
  go_quotes:['"They can always hurt you more."','"The patient is the one with the disease."','"Gomers don\'t leave. Neither will this shift."','"The delivery of good medical care is to do as much nothing as possible."','"At a cardiac arrest, the first procedure is to take your own pulse. You forgot."'],
  boss_wave:w=>`⚠️ BOSS: Shift ${w}`, norm_wave:w=>`📟 Shift ${w}`,
  shift_flavor:(w,isBoss,gold,towers)=>{
    if(w===1) return 'First shift. Fresh scrubs. The coffee is still warm. It won\'t last.';
    if(w===2) return 'You survived round one. Don\'t get cocky. The board hasn\'t noticed you yet.';
    if(w===3) return 'Three shifts in. You\'re starting to learn the names on the whiteboard.';
    if(w===5&&isBoss) return 'Administration is here. They smell budget like sharks smell blood.';
    if(w===10&&isBoss) return 'The Privatpatient is coming. Everyone is suddenly very professional.';
    if(w===15&&isBoss) return 'Fifteen shifts. The coffee machine knows your order. So does the compliance office.';
    if(w===20&&isBoss) return 'Twenty shifts. The interns think you\'re furniture. The nurses know you\'re not.';
    if(isBoss) return ['Management is circling.','Someone from the 5th floor wants a word.','The quality report is due. It was due yesterday.','Boardroom lights are on.'][w%4];
    if(w>=20) return ['The vending machine is your only friend.','You dream in ICD-10 codes.','The whiteboard is a crime scene.','Your stethoscope has seen things.','The night shift starts when the day shift gives up.'][w%5];
    if(w>=15) return ['The discharge paperwork breeds overnight.','Someone relabeled the crash cart. Again.','The printer is down. It was always down.','You start to understand why Dr. House was angry.'][w%4];
    if(w>=10) return ['The waiting room has its own ecosystem now.','You can hear the fax machine in your sleep.','The cafeteria called. They\'re running out of everything.','The elevator is broken. Take the stairs. With the stretcher.'][w%4];
    if(gold<40) return 'Budget is tight. The bean counters are watching.';
    if(towers.length>=8) return 'Your wing is well-equipped. Time to see if it holds.';
    return ['Another day, another admission.','The hallway smells like hand sanitizer and regret.','Someone left a coffee on the ECG. Classic.','Pager beeps. Always at the worst time.','The whiteboard is filling up.'][w%5];
  },
  upkeep:n=>'-'+n+'💰 upkeep', admitted:'ADMITTED',
  sell_confirm:(name,val)=>'🗑️ Tap again to sell '+name+' (+'+val+'💰)',
  upgrade_prompt:(name,lvl,cost)=>'⬆️ Tap to upgrade '+name+' to Lv'+(lvl+1)+' (💰'+cost+')',
  upgrade_max:(name)=>name+' MAX — tap to sell',
  upgrade_text:'LVL UP!',
  sell_label:'SELL?',
  resurge_text:'BACK AGAIN!',
  sc_shift:w=>'Shift '+w, sc_upkeep:n=>'⚠️ Maintenance: -'+n+'💰', sc_gold:n=>'Budget: '+n+'💰', sc_resume:'▶️ Start Shift', sc_no_mut:'No modifiers this shift.',
  tutorial:'💡 Select equipment below, then tap an empty tile to place it. Place near the path for best results!',
  tutorial2:'💡 Tap a placed tower to upgrade it or sell it. Upgrading is often better than placing new ones!',
  tutorial3:'💡 Towers near each other can trigger combos. Experiment with placement!',
  tower_tip:(t)=>t.emoji+' '+t.name+': '+t.desc+' · DMG '+t.dmg+' · RNG '+t.range+' · 💰'+t.cost,
  new_equip:'NEW EQUIPMENT', new_threat:'INCOMING', boss_incoming:'BOSS INCOMING', crisis:'⚠️ CRISIS',
  er:'ER',ward:'WARD',
  // Tower names/intros
  towers:{
    iv:{name:'IV Pole',desc:'Saline shots',intro:'"Start every patient with a line. Even the ones who don\'t need one. Especially the ones who don\'t need one."',introName:'The IV Pole'},
    monitor:{name:'Monitor',desc:'Rapid beeps — annoys everyone',intro:'"The monitor beeps. It always beeps. Nobody knows why. Nobody ever will."',introName:'The Cardiac Monitor'},
    defib:{name:'Defib',desc:'Area shock — clear!',intro:'"CLEAR! ...Everyone stepped back except the intern holding the bed rail."',introName:'The Defibrillator'},
    ice:{name:'Ice Bath',desc:'Slows 40% — consumable',intro:'"Therapeutic hypothermia. Or as the nurses call it: Tuesday. Warning: subject to supply shortages."',introName:'The Ice Bath'},
    xray:{name:'X-Ray',desc:'Piercing radiation beam',intro:'"If the radiology resident and the BMS both see a lesion on the chest X-ray, there can be no lesion there."',introName:'The Portable X-Ray'},
    laxative:{name:'Laxative',desc:'Toxic DOT — the nuclear option',intro:'"GoLYTELY they called it. There was nothing lightly about it. A weapon of mass destruction in a plastic jug."',introName:'Industrial Laxative'},
    restraint:{name:'Restraints',desc:'Immobilize 1.5s',intro:'"Soft restraints, they call them. There is nothing soft about a man who cannot move his arms."',introName:'The Restraints'},
    overhead:{name:'Overhead Page',desc:'Wide disruption — chains 5, slows',intro:'"PAGING DR. BLUE, ROOM 314." The noise reaches everywhere. Everyone stops. Nobody named Blue has ever worked here.',introName:'The Overhead Page'},
    mri:{name:'MRI',desc:'% max HP damage',intro:'"The MRI suite: a $3 million machine that takes 45 minutes to tell you what you already knew."',introName:'The MRI Machine'},
    attending:{name:'Attending',desc:'Buffs adjacent +30%',intro:'"The Attending arrives. The Attending pronounces. The Attending leaves. The intern does the work."',introName:'The Attending Physician'},
    nurse:{name:'Nurse',desc:'Reliable rapid shots',intro:'"The nurse has been here longer than the walls. She knows which drawer has the good tape. She does not need a doctor to tell her what to do."',introName:'The Ward Nurse'},
    dotbase:{name:'dotbase',desc:'4× vs admin & docs, AoE dissolve',intro:'"Structured data. FHIR-native. The paperwork doesn\'t stand a chance. Every form, every duplicate, every DRG query — vaporized into clean, structured data."',introName:'dotbase'},
    sell:{name:'Sell',desc:'Sell equip (50%)'},
  },
  enemies:{
    gomer:{name:'GOMER',intro:'"GOMER: Get Out of My Emergency Room. They don\'t leave. That\'s Law number one."',introName:'The GOMER'},
    lol:{name:'LOL in NAD',intro:'"Little Old Lady in No Apparent Distress. She\'s been this way for decades. She\'ll outlive you, your children, and this hospital."',introName:'LOL in NAD'},
    bounce:{name:'Bounce-back',intro:'"Discharged at 4 AM. Back in the ER by 7. You clear them — they come right back, faster than before. The chart note just says: see previous."',introName:'The Bounce-Back'},
    flyer:{name:'3 AM Complainer',intro:'"Has had the same symptoms for three weeks. Chose 3 AM on a Tuesday to demand immediate attention. Fast. Annoying. Fragile — but there are so many of them."',introName:'The 3 AM Complainer'},
    seeker:{name:'Drug Seeker',intro:'"My pain is fifteen out of ten, doc. I\'m allergic to everything except Dilaudid. Tylenol gives me a rash. Ibuprofen gives me a different rash."',introName:'The Drug Seeker'},
    paper:{name:'Paperwork',intro:'"Consent forms. Discharge summaries. Insurance pre-auths. Progress notes. The actual medicine was the easy part."',introName:'The Paperwork'},
    admin:{name:'Administration',intro:'"We need to discuss your throughput metrics. Your average door-to-disposition time is concerning. Also, your parking pass has been revoked."',introName:'HOSPITAL ADMINISTRATION'},
    lawsuit:{name:'Malpractice Suit',intro:'"30% armored. It moves slowly. It is very patient. It has all the time in the world. You do not."',introName:'THE MALPRACTICE SUIT'},
    jcaho:{name:'JCAHO Inspector',intro:'"The Joint Commission is here. Unannounced. Your hand sanitizer dispensers are 2 inches too high. Your fire exits are labeled in the wrong font."',introName:'THE JCAHO INSPECTOR'},

const C=document.getElementById('cv'),X=C.getContext('2d');
const COLS=10,ROWS=16,TILE=36,IW=COLS*TILE,IH=ROWS*TILE;
C.width=IW;C.height=IH;
let dScale=1;
function resize(){const gc=document.getElementById('gc');dScale=Math.min((gc.clientWidth-4)/IW,(gc.clientHeight-4)/IH,2);C.style.width=Math.floor(IW*dScale)+'px';C.style.height=Math.floor(IH*dScale)+'px';}
window.addEventListener('resize',resize);window.addEventListener('orientationchange',()=>setTimeout(resize,150));resize();

let PATH=[],pathSet=new Set();

function generatePath(){
  PATH=[];pathSet=new Set();
  // All coordinates clamped to 1..(COLS-2) / 1..(ROWS-2) to keep path visible
  const r1=1+Math.floor(Math.random()*2); // entry row 1-2
  const t1x=Math.min(COLS-2,5+Math.floor(Math.random()*2)); // first turn x 5-6
  const t1y=Math.min(ROWS-4,4+Math.floor(Math.random()*2)); // first turn y 4-5
  const t2x=1+Math.floor(Math.random()*2); // left turn x 1-2
  const t2y=Math.min(ROWS-4,t1y+2+Math.floor(Math.random()*2)); // second turn y
  const t3x=Math.min(COLS-2,6+Math.floor(Math.random()*2)); // right turn x 6-7
  const t4y=Math.min(ROWS-3,t2y+3+Math.floor(Math.random()*2)); // fourth turn y
  const exitX=Math.max(1,Math.min(COLS-2,2+Math.floor(Math.random()*3))); // exit x 2-4
  // Entry from left edge
  for(let x=0;x<=t1x;x++) PATH.push([x,r1]);
  for(let y=r1+1;y<=t1y;y++) PATH.push([t1x,y]);
  for(let x=t1x-1;x>=t2x;x--) PATH.push([x,t1y]);
  for(let y=t1y+1;y<=t2y;y++) PATH.push([t2x,y]);
  for(let x=t2x+1;x<=t3x;x++) PATH.push([x,t2y]);
  for(let y=t2y+1;y<=t4y;y++) PATH.push([t3x,y]);
  for(let x=t3x-1;x>=exitX;x--) PATH.push([x,t4y]);
  for(let y=t4y+1;y<=ROWS-1;y++) PATH.push([exitX,y]);
  // Clamp all path tiles
  PATH=PATH.map(([x,y])=>[Math.max(0,Math.min(COLS-1,x)),Math.max(0,Math.min(ROWS-1,y))]);
  pathSet.clear();PATH.forEach(([x,y])=>pathSet.add(x+','+y));
}
function pathPos(p){const i=Math.min(Math.floor(p),PATH.length-2),t=p-i;const[x1,y1]=PATH[i],[x2,y2]=PATH[Math.min(i+1,PATH.length-1)];return{x:(x1+(x2-x1)*t+.5)*TILE,y:(y1+(y2-y1)*t+.5)*TILE};}

function genWave(w){
  const q=[];const isBoss=w%5===0&&w>0;
  if(isBoss){const bi=Math.min(Math.floor(w/5)-1,3);const boss=ETYPES[6+bi];const bc=Math.max(1,Math.floor(w/10));for(let i=0;i<bc;i++)q.push({type:boss,delay:i*60});const mc=Math.floor(w*1.2)+4;const mxR=Math.min(3+Math.floor(w/4),w>=15?19:w>=12?19:w>=10?19:6);const av=ETYPES.slice(0,mxR).filter(e=>!e.boss);for(let i=0;i<mc;i++)q.push({type:av[Math.floor(Math.random()*av.length)],delay:bc*60+i*12});}
  else{
    // Gentle early game: fewer enemies, only basics
    let count,mxR;
    if(w<=3){count=3+w;mxR=Math.min(w,2);}
    else if(w<=6){count=5+Math.floor(w*1.2);mxR=Math.min(2+Math.floor(w/2),6);}
    else{count=5+Math.floor(w*1.8)+Math.floor(w*w*.03);mxR=Math.min(2+Math.floor(w/2),w>=15?19:w>=12?19:w>=10?19:6);}
    const av=ETYPES.slice(0,mxR).filter(e=>!e.boss);for(let i=0;i<count;i++)q.push({type:av[Math.floor(Math.random()*av.length)],delay:i*(w<=3?25:w<=6?18:15)});
  }
  // HP scaling: flat for first 5 waves, then gentle ramp
  const hpS=w<=5?1:w<=10?1+(w-5)*.15:w<=20?1+5*.15+Math.pow(w-10,1.3)*.15:1+5*.15+Math.pow(10,1.3)*.15+Math.pow(w-20,1.6)*.2;
  // Early reward boost
  const earlyBonus=w<=5?1.5:w<=8?1.2:1;
  const lateSpd=w>=20?1+((w-20)*.04):w>=15?1+((w-15)*.02):1;
  const lateArmor=w>=25?.15+(w-25)*.02:w>=20?.05+(w-20)*.02:0;
  q.forEach(e=>{e.hpM=hpS;e.spdMult=(w<=3?.8:1)*lateSpd;e.rewardMult=earlyBonus;e.armorAdd=Math.min(lateArmor,.5);});
  activeMutators=[];activeTowerEffects={rangeMult:1,rateMult:1};disabledTowers=new Set();
  let nm=0;if(w>=30)nm=Math.min(2+Math.floor((w-30)/5),4);else if(w>=25)nm=Math.min(1+Math.floor((w-25)/6),3);else if(w>=15)nm=Math.min(1+Math.floor((w-15)/7),2);else if(w>=8)nm=1;
  if(nm>0){let mt=w>=25?3:w>=15?2:1;const pool=MUTATORS.filter(m=>m.tier<=mt).slice();for(let i=0;i<nm&&pool.length;i++){const idx=Math.floor(Math.random()*pool.length);const mut=pool.splice(idx,1)[0];activeMutators.push(mut);mut.apply(q);if(mut.towerEffect){if(mut.towerEffect.rangeMult)activeTowerEffects.rangeMult*=mut.towerEffect.rangeMult;if(mut.towerEffect.rateMult)activeTowerEffects.rateMult*=mut.towerEffect.rateMult;}if(mut.disable)mut.disable.forEach(id=>disabledTowers.add(id));}}
  return q;
}

let pendingSpawnQueue=[];

function startWave(){
  wave++;
  // Upkeep calc
  const upRate=wave>=20?.12:wave>=15?.1:.08;
  const up=towers.reduce((s,t)=>s+Math.floor(t.cost*upRate),0);
  if(up>0&&wave>1) gold=Math.max(0,gold-up);

  // Gen wave (sets mutators/disabled) — but don't start spawning yet
  pendingSpawnQueue=genWave(wave);

  // Pause immediately
  paused=true;

  // Tower unlocks
  TOWERS.forEach(t=>{if(t.unlock===wave&&!t.sell&&!seenTowers.has(t.id)){seenTowers.add(t.id);queueIntro(L('new_equip'),t.emoji,T(t,'introName')||t.name,T(t,'intro')||'','Cost: '+t.cost+'💰 · DMG: '+t.dmg+' · Range: '+t.range);}});

  // Enemy intros
  const seen2=new Set(pendingSpawnQueue.map(e=>e.type.idx));
  seen2.forEach(idx=>{if(!seenEnemies.has(idx)){seenEnemies.add(idx);const et=ETYPES[idx];const stats='HP: '+et.hp+' · SPD: '+et.spd+(et.boss?' · ⚠️ BOSS':'')+(et.flying?' · ✈️':'')+(et.armor?' · 🛡️':'')+(et.healer?' · 💚':'');queueIntro(et.boss?L('boss_incoming'):L('new_threat'),et.emoji,E(idx,'introName')||'?',E(idx,'intro')||'',stats);}});

  // Mutator intros
  activeMutators.forEach(m=>{if(m.disable&&!seenMutators.has(m.id)){seenMutators.add(m.id);const flav=M(m.id,'flavor')||'';if(flav)queueIntro(L('crisis'),M(m.id,'name')||'?',M(m.id,'name'),flav,M(m.id,'desc'));}});

  // Queue the shift card to show AFTER all intros are done
  queueShiftCard(up);

  // Banner (visible during gameplay)
  const mb=document.getElementById('mutator-bar');
  if(activeMutators.length>0){mb.style.display='flex';mb.innerHTML=activeMutators.map(m=>'<span class="mut-pill'+(m.disable?' disable':'')+'">'+M(m.id,'name')+': '+M(m.id,'desc')+'</span>').join('');}else mb.style.display='none';

  updateUI();
}

function queueShiftCard(upkeep){
  // Add the shift card as a special item in the intro queue
  introQueue.push({isShiftCard:true,upkeep:upkeep});
  if(!showingIntro) showNextIntro();
}

function showShiftCard(upkeep){
  const sc=document.getElementById('shift-card');
  document.getElementById('sc-title').textContent='📟 '+L('sc_shift')(wave);
  
  // Narrative flavor
  const isBoss=wave%5===0&&wave>0;
  document.getElementById('sc-narrative').textContent=L('shift_flavor')(wave,isBoss,gold,towers);

  // Upkeep — only show if there is one
  const upEl=document.getElementById('sc-upkeep');
  if(upkeep>0&&wave>1){upEl.textContent=L('sc_upkeep')(upkeep);upEl.style.display='';}
  else upEl.style.display='none';

  document.getElementById('sc-gold').textContent=L('sc_gold')(gold);

  // Mutators — only show section if there are any
  const mutBox=document.getElementById('sc-mutators');
  if(activeMutators.length>0){
    mutBox.style.display='flex';
    let html='';
    activeMutators.forEach(m=>{
      html+='<span class="mut-pill'+(m.disable?' disable':'')+'">'+M(m.id,'name')+': '+M(m.id,'desc')+'</span>';
      // First-time explanation
      if(!seenMutators.has(m.id+'_explained')){
        seenMutators.add(m.id+'_explained');
        const expl=M(m.id,'explain')||'';
        if(expl) html+='<div style="width:100%;font-size:10px;color:#5a6a7c;margin:2px 0 4px;font-style:italic">'+expl+'</div>';
      }
    });
    mutBox.innerHTML=html;
  } else {
    mutBox.style.display='none';
  }

  // Tutorial — waves 1-3
  const tut=document.getElementById('sc-tutorial');
  if(wave<=3){tut.style.display='block';tut.textContent=wave===1?L('tutorial'):wave===2?L('tutorial2'):L('tutorial3');}
  else tut.style.display='none';

  sc.querySelector('.pbtn').textContent=L('sc_resume');
  sc.classList.remove('hid');
}

function dismissShiftCard(){
  document.getElementById('shift-card').classList.add('hid');
  spawnQueue=pendingSpawnQueue;pendingSpawnQueue=[];
  waveTimer=0;
  paused=manualPause;
  showingIntro=false;
  showAnnounce(wave%5===0?L('boss_wave')(wave):L('norm_wave')(wave));
  // First-round tutorial: auto-select first tower and show hint tile
  if(wave===1&&!localStorage.getItem('kraft_td_played')){
    selectedTower=TOWERS[0].id;
    // Find a good tile adjacent to path, near start
    tutorialHintTile=null;
    for(let i=2;i<Math.min(PATH.length,15);i++){
      const[px,py]=PATH[i];
      const candidates=[[px-1,py],[px+1,py],[px,py-1],[px,py+1]];
      for(const[cx,cy] of candidates){
        if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS&&!pathSet.has(cx+','+cy)&&!towers.find(t=>t.col===cx&&t.row===cy)){
          tutorialHintTile=[cx,cy];break;
        }
      }
      if(tutorialHintTile)break;
    }
    tutorialActive=true;
    updateUI();
  }
}

function getAdj(c,r){const s=new Set();towers.forEach(t=>{if(t.sell)return;const dx=Math.abs(t.col-c),dy=Math.abs(t.row-r);if(dx<=1&&dy<=1&&!(dx===0&&dy===0))s.add(t.id);});return s;}
function checkCombo(tw){const adj=getAdj(tw.col,tw.row);for(const c of COMBOS)if((tw.id===c.a&&adj.has(c.b))||(tw.id===c.b&&adj.has(c.a)))return c;return null;}
function getAura(tw){let m=1;towers.forEach(t=>{if(t.aura&&t!==tw){const dx=Math.abs(t.col-tw.col),dy=Math.abs(t.row-tw.row);if(dx<=t.aura.range&&dy<=t.aura.range)m*=t.aura.dmgMult;}});return m;}

function closeTowerPanel(){document.getElementById('tower-panel').style.display='none';document.getElementById('tp-backdrop').style.display='none';selectedForSell=null;updateUI();}
function doUpgrade(){
  if(!selectedForSell)return;
  const tw=towers.find(t=>t.col===selectedForSell.col&&t.row===selectedForSell.row);
  if(!tw)return;
  const upgCost=Math.floor(tw.baseCost*.6);
  if(tw.level<3&&gold>=upgCost){
    gold-=upgCost;tw.level++;
    tw.dmg=Math.round(tw.baseDmg*(1+.35*(tw.level-1)));
    tw.range=+(tw.baseRange*(1+.15*(tw.level-1))).toFixed(2);
    tw.cost+=upgCost;
    spawnP(tw.x,tw.y,'#ffd700',12);floatText(tw.x,tw.y-10,L('upgrade_text'),'#ffd700');
  }
  closeTowerPanel();
}
function doSell(){
  if(!selectedForSell)return;
  const tw=towers.find(t=>t.col===selectedForSell.col&&t.row===selectedForSell.row);
  if(!tw)return;
  const sellVal=Math.floor(tw.cost/2);
  gold+=sellVal;towers=towers.filter(t=>t!==tw);

function placeTower(col,row){

  }

function lightenColor(hex){try{const r=Math.min(255,parseInt(hex.slice(1,3),16)+40);const g=Math.min(255,parseInt(hex.slice(3,5),16)+40);const b=Math.min(255,parseInt(hex.slice(5,7),16)+40);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}catch(e){return hex;}}

function fire(tw,tgt){

  if(tw.dotbase){
    const isAdmin=tgt.tags&&(tgt.tags.includes('admin')||tgt.tags.includes('document')||tgt.tags.includes('repetitive'));
    const mult=isAdmin?4:1;
    dmg*=mult;
    // AoE dissolve effect on all nearby admin/doc targets
    if(isAdmin){
      enemies.forEach(o=>{if(o!==tgt&&o.tags&&(o.tags.includes('admin')||o.tags.includes('document'))&&Math.sqrt((o.x-tgt.x)**2+(o.y-tgt.y)**2)<2*TILE){o.hp-=dmg*.3;spawnP(o.x,o.y,'#5ce0d0',3);}});
    }
    // Cool teal dissolve beam
    particles.push({x:tw.x,y:tw.y,x2:tgt.x,y2:tgt.y,life:12,maxLife:12,beam:true,color:'#2D6A6A',width:isAdmin?4:2});
    // Secondary sparkle beam
    particles.push({x:tw.x,y:tw.y,x2:tgt.x,y2:tgt.y,life:8,maxLife:8,beam:true,color:'#5ce0d0',width:isAdmin?2:1});
    if(isAdmin){spawnP(tgt.x,tgt.y,'#5ce0d0',6);floatText(tgt.x,tgt.y-15,'STRUCTURED','#5ce0d0');}
    dealDmg(tgt,dmg,tw,combo);
    // digitalnurse combo: dotbase+nurse adjacent = also slow admin targets
    if(combo&&combo.effect==='digitalnurse'){enemies.forEach(o=>{if(o.tags&&o.tags.includes('admin')&&!o.slowImmune&&o.slowTimer<=0&&Math.sqrt((o.x-tgt.x)**2+(o.y-tgt.y)**2)<2.5*TILE){o.slowTimer=80;o.spd=o.baseSpd*.4;}});spawnP(tgt.x,tgt.y,'#ff6b81',5);}
    return;
  }
  if(tw.beam){const bw=(tw.id==='attending'||tw.id==='robii'?3:2)+((tw.level||1)-1);const bc=(tw.level||1)>=3?'#ffd700':(tw.level||1)>=2?lightenColor(tw.projC):tw.projC;dealDmg(tgt,dmg,tw,combo);particles.push({x:tw.x,y:tw.y,x2:tgt.x,y2:tgt.y,life:10,maxLife:10,beam:true,color:bc,width:bw});}
  else if(tw.chain){let h=[tgt];dealDmg(tgt,dmg,tw,combo);let pv=tgt;const chainRange=(tw.id==='overhead'?3.5:2.5)*TILE;for(let c=0;c<tw.chain;c++){let cl=null,cd=Infinity;enemies.forEach(e=>{if(h.includes(e)||e.hp<=0)return;const dx=e.x-pv.x,dy=e.y-pv.y,d=Math.sqrt(dx*dx+dy*dy);if(d<chainRange&&d<cd){cl=e;cd=d;}});if(cl){h.push(cl);dealDmg(cl,dmg*.6,tw,combo);particles.push({x:pv.x,y:pv.y,x2:cl.x,y2:cl.y,life:8,maxLife:8,beam:true,color:tw.id==='overhead'?'#fdcb6e':'#ffeaa7',width:tw.id==='overhead'?2:1.5});pv=cl;}}}
  else{const lvlMult=tw.level||1;const pSize=tw.projS*(1+(lvlMult-1)*.4);const pColor=lvlMult>=3?'#ffd700':lvlMult>=2?lightenColor(tw.projC):tw.projC;projectiles.push({x:tw.x,y:tw.y,tx:tgt.x,ty:tgt.y,target:tgt,speed:5,damage:dmg,splash:tw.splash||0,slow:tw.slow||0,burn:tw.burn||null,root:tw.root||null,color:pColor,size:pSize,combo,pctDmg:tw.pctDmg||0,level:lvlMult});}
}

function dealDmg(e,dmg,tw,combo){
  // splashOnly: immune to direct single-target hits (only takes splash/beam/DOT)
  if(e.splashOnly&&tw&&!tw.splash&&!tw.beam&&!tw.burn&&!tw.pctDmg&&!combo){return;}
  const ad=dmg*(1-e.armor);if(tw&&tw.pctDmg)e.hp-=e.maxHp*tw.pctDmg;e.hp-=ad;
  if(tw&&tw.slow&&e.slowTimer<=0&&!e.slowImmune){e.spd=e.baseSpd*(1-Math.min(tw.slow,.5));e.slowTimer=60;}
  if(tw&&tw.burn){e.burnDmg=tw.burn.dmg;e.burnTimer=tw.burn.dur;}
  if(tw&&tw.root&&e.rootTimer<=0){e.rootTimer=tw.root.dur;e.spd=0;}
  if(combo){switch(combo.effect){
    case'steam':enemies.forEach(o=>{if(o===e)return;const dx=o.x-e.x,dy=o.y-e.y;if(Math.sqrt(dx*dx+dy*dy)<2*TILE){o.hp-=8;if(!o.slowImmune&&o.slowTimer<=0){o.slowTimer=60;o.spd=o.baseSpd*.5;}}});spawnP(e.x,e.y,'#b2bec3',12);break;
    case'chainspore':enemies.forEach(o=>{if(o!==e&&Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<2*TILE)o.hp-=dmg*.4;});spawnP(e.x,e.y,'#a29bfe',8);break;
    case'thunderroot':enemies.forEach(o=>{if(o===e)return;if(Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<2*TILE){if(!o.slowImmune&&o.rootTimer<=0){o.rootTimer=50;o.spd=0;}o.hp-=10;}});spawnP(e.x,e.y,'#ffeaa7',10);break;
    case'soulburn':e.burnDmg=e.maxHp*.01;e.burnTimer=150;break;}}
  if(e.hp<=0){
    // Resurge: comes back once after being cleared
    if(e.resurge&&!e.hasResurged){
      e.hasResurged=true;
      e.hp=e.maxHp*.6;
      e.progress=Math.max(0,e.progress-3);
      e.slowTimer=0;e.burnTimer=0;e.rootTimer=0;
      e.spd=e.baseSpd*1.2; // comes back faster
      spawnP(e.x,e.y,'#e17055',8);
      floatText(e.x,e.y-10,L('resurge_text'),'#e17055');
      return; // don't give gold, don't count as kill
    }
    gold+=e.reward;score+=e.reward;spawnP(e.x,e.y,e.color,e.boss?15:8);floatText(e.x,e.y-10,'+'+e.reward,'#74b9ff');if(tw)tw.kills++;
    // Splitter: spawn 2 mini copies

    // Spawner: spawns 2 random early-type enemies on death
    if(e.spawner&&!e.hasSpawned){e.hasSpawned=true;for(let i=0;i<2;i++){const st=ETYPES[Math.floor(Math.random()*3)];enemies.push({x:e.x,y:e.y,progress:Math.max(0,e.progress-.5-i*.3),hp:st.hp*2,maxHp:st.hp*2,spd:st.spd,baseSpd:st.spd,reward:st.reward,color:st.color,emoji:st.emoji,boss:false,size:st.size*.8,animType:st.animType,flying:false,armor:0,healer:false,tags:st.tags||[],splitter:false,shielder:false,copier:false,resurge:false,hasResurged:false,rusher:false,disabler:false,regen:false,burnImmune:false,goldDrain:false,spawner:false,splashOnly:false,slowImmune:false,disableCooldown:0,slowTimer:0,burnTimer:0,burnDmg:0,rootTimer:0,animPhase:Math.random()*Math.PI*2});}spawnP(e.x,e.y,'#e74c3c',10);}
  }
}
function spawnP(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=.5+Math.random()*2.5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*20,maxLife:40,color:c,size:1.5+Math.random()*3});}}

function update(){
  if(paused)return;const sp=speedMult;tick+=sp;
  if(spawnQueue.length>0){waveTimer+=sp;while(spawnQueue.length>0&&spawnQueue[0].delay<=waveTimer){const s=spawnQueue.shift();spawnEnemy(s.type,s.hpM,s.spdMult,s.rewardMult,s.armorAdd);}}

    if(e.shielder&&tick%30<sp){enemies.forEach(o=>{if(o!==e&&o.hp>0&&Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<2*TILE){o.armor=Math.min(.6,o.armor+.002*sp);}});}

    if(e.rusher&&tick%80<sp){enemies.forEach(o=>{if(o!==e&&o.hp>0&&Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<2.5*TILE){o.spd=Math.min(o.baseSpd*1.6,o.spd*1.15);}});}
    // GoldDrain: halves reward of nearby enemies

    if(e.rootTimer>0){e.rootTimer-=sp;if(e.rootTimer<=0){e.spd=e.baseSpd;if(e.slowTimer>0)e.spd=e.baseSpd*.6;}}else e.progress+=(e.spd*.04)*sp;const pos=pathPos(e.progress);e.x=pos.x;e.y=pos.y;if(e.slowTimer>0){e.slowTimer-=sp;if(e.slowTimer<=0)e.spd=e.baseSpd;}if(e.burnTimer>0&&!e.burnImmune){e.burnTimer-=sp;e.hp-=e.burnDmg*.02*sp;if(e.burnTimer<=0)e.burnDmg=0;}if(e.burnImmune){e.burnTimer=0;e.burnDmg=0;}if(e.healer&&tick%60<sp){enemies.forEach(o=>{if(o!==e&&o.hp>0&&Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<3*TILE)o.hp=Math.min(o.maxHp,o.hp+o.maxHp*.01);});}if(e.progress>=PATH.length-1){lives-=e.boss?5:1;e.hp=0;spawnP(e.x,e.y,'#d63031',10);floatText(e.x,e.y,L('admitted'),'#d63031');}});

  projectiles.forEach(p=>{if(p.target&&p.target.hp>0){p.tx=p.target.x;p.ty=p.target.y;}const dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<p.speed*sp*2){if(p.splash>0){const sr=p.splash*TILE;enemies.forEach(e=>{if(Math.sqrt((e.x-p.tx)**2+(e.y-p.ty)**2)<=sr)dealDmg(e,p.damage,p,p.combo);});spawnP(p.tx,p.ty,p.color,6);}else{if(p.target&&p.target.hp>0)dealDmg(p.target,p.damage,p,p.combo);}p.dead=true;}else{p.x+=(dx/dist)*p.speed*sp*2;p.y+=(dy/dist)*p.speed*sp*2;}});

}

      const sr=t.range*TILE*activeTowerEffects.rangeMult;
      X.beginPath();X.arc(t.x,t.y,sr,0,Math.PI*2);X.fillStyle='rgba(45,106,106,.06)';X.fill();X.strokeStyle='rgba(45,106,106,.3)';X.lineWidth=2;X.stroke();
      X.strokeStyle='rgba(255,215,0,.6)';X.lineWidth=2.5;X.setLineDash([4,3]);X.beginPath();X.arc(t.x,t.y,16,0,Math.PI*2);X.stroke();X.setLineDash([]);
    }
    if(t.level&&t.level>1&&!off){X.fillStyle='#ffd700';for(let d=0;d<t.level-1;d++){X.beginPath();X.arc(t.x-3+d*6,t.y-12,2.5,0,Math.PI*2);X.fill();}}
    const w=Math.sin(tick*.03+t.col*2)*.4;X.globalAlpha=off?.3:1;X.font='19px serif';X.textAlign='center';X.textBaseline='middle';X.fillText(t.emoji,t.x,t.y+w);X.globalAlpha=1;if(off){X.strokeStyle='rgba(255,80,50,.4)';X.lineWidth=2;X.beginPath();X.moveTo(t.x-8,t.y-8);X.lineTo(t.x+8,t.y+8);X.moveTo(t.x+8,t.y-8);X.lineTo(t.x-8,t.y+8);X.stroke();}if(t.kills>=5&&!off){X.font='bold 7px Figtree,sans-serif';X.fillStyle='rgba(255,255,255,.35)';X.fillText('×'+t.kills,t.x,t.y+13);}});
  enemies.forEach(e=>{const t=e.animPhase;let ox=0,oy=0,sc=1;switch(e.animType){case'shuffle':ox=Math.sin(t*1.5)*2;oy=Math.abs(Math.sin(t*3))*-1.5;break;case'bob':oy=Math.sin(t*1.5)*3;break;case'scurry':ox=Math.sin(t*4)*2;oy=Math.abs(Math.sin(t*4))*-2;break;case'slide':ox=Math.sin(t*.8)*1;break;case'flutter':oy=Math.sin(t*3)*4;sc=1+Math.sin(t*6)*.08;break;case'pulse':sc=1+Math.sin(t*1.2)*.12;break;}const dx2=e.x+ox,dy2=e.y+oy-2;X.fillStyle='rgba(0,0,0,.18)';X.beginPath();X.ellipse(e.x,e.y+10*e.size,8*e.size,3,0,0,Math.PI*2);X.fill();if(e.burnTimer>0){X.fillStyle=`rgba(225,112,85,${.12+Math.sin(tick*.2)*.06})`;X.beginPath();X.arc(dx2,dy2,12*e.size,0,Math.PI*2);X.fill();}if(e.rootTimer>0){X.fillStyle='rgba(0,184,148,.2)';X.beginPath();X.arc(dx2,dy2+4,10*e.size,0,Math.PI*2);X.fill();}if(e.slowTimer>0){X.fillStyle='rgba(116,185,255,.15)';X.beginPath();X.arc(dx2,dy2,12*e.size,0,Math.PI*2);X.fill();}if(e.healer&&tick%40<20){X.strokeStyle=`rgba(255,215,0,${.08+Math.sin(tick*.1)*.04})`;X.lineWidth=1;X.beginPath();X.arc(dx2,dy2,3*TILE*(tick%40)/40,0,Math.PI*2);X.stroke();}if(e.shielder){X.strokeStyle=`rgba(253,121,168,${.12+Math.sin(tick*.05)*.06})`;X.lineWidth=1.5;X.beginPath();X.arc(dx2,dy2,2*TILE,0,Math.PI*2);X.stroke();}if(e.copier&&!e.copied){X.fillStyle=`rgba(0,206,201,${.06+Math.sin(tick*.15)*.04})`;X.beginPath();X.arc(dx2,dy2,10*e.size,0,Math.PI*2);X.fill();}if(e.rusher){X.strokeStyle=`rgba(224,86,160,${.15+Math.sin(tick*.06)*.08})`;X.lineWidth=1;X.beginPath();X.arc(dx2,dy2,2*TILE,0,Math.PI*2);X.stroke();for(let ar=0;ar<3;ar++){const aa=tick*.04+ar*Math.PI*2/3;X.fillStyle='rgba(224,86,160,.2)';X.beginPath();X.arc(dx2+Math.cos(aa)*12,dy2+Math.sin(aa)*12,2,0,Math.PI*2);X.fill();}}if(e.disabler){X.fillStyle=`rgba(44,62,80,${.08+Math.sin(tick*.08)*.05})`;X.beginPath();X.arc(dx2,dy2,14*e.size,0,Math.PI*2);X.fill();if(tick%60<30){X.font='8px serif';X.textAlign='center';X.fillText('⚡',dx2+10,dy2-8);}}if(e.regen){const rp=Math.sin(tick*.1)*.06+.1;X.strokeStyle=`rgba(0,180,216,${rp})`;X.lineWidth=1.5;X.beginPath();X.arc(dx2,dy2,11*e.size,tick*.03,tick*.03+Math.PI*1.2);X.stroke();}if(e.burnImmune&&e.burnTimer<=0){X.font='7px serif';X.textAlign='center';X.fillText('🔥',dx2-9,dy2+10);X.strokeStyle='rgba(200,50,50,.4)';X.lineWidth=1.5;X.beginPath();X.moveTo(dx2-12,dy2+7);X.lineTo(dx2-6,dy2+13);X.stroke();}if(e.goldDrain){X.fillStyle=`rgba(255,215,0,${.08+Math.sin(tick*.06)*.05})`;X.beginPath();X.arc(dx2,dy2,3*TILE,0,Math.PI*2);X.fill();if(tick%50<25){X.font='7px serif';X.fillText('💰',dx2+12,dy2-10);}}if(e.spawner){X.strokeStyle=`rgba(231,76,60,${.15+Math.sin(tick*.1)*.08})`;X.lineWidth=1.5;X.beginPath();X.arc(dx2,dy2,12*e.size,0,Math.PI*2);X.stroke();}if(e.slowImmune){X.font='7px serif';X.textAlign='center';X.fillText('❄️',dx2+11,dy2+11);X.strokeStyle='rgba(100,100,200,.4)';X.lineWidth=1.5;X.beginPath();X.moveTo(dx2+8,dy2+8);X.lineTo(dx2+14,dy2+14);X.stroke();}if(e.splashOnly){X.strokeStyle=`rgba(142,68,173,${.2+Math.sin(tick*.07)*.1})`;X.lineWidth=2;X.setLineDash([2,4]);X.beginPath();X.arc(dx2,dy2,11*e.size,0,Math.PI*2);X.stroke();X.setLineDash([]);}X.save();X.translate(dx2,dy2);X.scale(sc*e.size,sc*e.size);X.font=`${e.boss?24:17}px serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(e.emoji,0,0);X.restore();const bw=e.boss?26:16;const hp=e.hp/e.maxHp;const by=dy2-(e.boss?17:12)*e.size;X.fillStyle='rgba(0,0,0,.35)';X.fillRect(dx2-bw/2,by,bw,3);X.fillStyle=hp>.5?'#00b894':hp>.25?'#fdcb6e':'#d63031';X.fillRect(dx2-bw/2,by,bw*Math.max(0,hp),3);if(e.boss){X.font='9px serif';X.textAlign='center';X.fillText('⚠️',dx2,by-5);}if(e.armor>0){X.font='7px serif';X.fillText('🛡️',dx2+bw/2+4,by+2);}});
  projectiles.forEach(p=>{const lvl=p.level||1;X.fillStyle=p.color;X.shadowColor=p.color;X.shadowBlur=4+lvl*3;X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();if(lvl>=2){X.globalAlpha=.3;X.beginPath();X.arc(p.x,p.y,p.size*1.8,0,Math.PI*2);X.fill();X.globalAlpha=1;}X.shadowBlur=0;});
  particles.forEach(p=>{const a=p.life/p.maxLife;if(p.beam){X.strokeStyle=p.color+Math.floor(a*180).toString(16).padStart(2,'0');X.lineWidth=p.width||2;X.beginPath();X.moveTo(p.x,p.y);X.lineTo(p.x2,p.y2);X.stroke();}else{X.globalAlpha=a;X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();X.globalAlpha=1;}});
  floatingTexts.forEach(f=>{const a=f.life/f.maxLife;X.globalAlpha=a;X.fillStyle=f.color;X.font='bold 10px Figtree,sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText(f.text,f.x,f.y);X.globalAlpha=1;});
  // Law at bottom
  document.getElementById('law').textContent=L('laws')[wave%L('laws').length]||'';
}

function updateUI(){
  document.getElementById('gd').textContent=gold;document.getElementById('wd').textContent=wave;document.getElementById('ld').textContent=lives;document.getElementById('sd').textContent=score;
  document.querySelectorAll('.tb').forEach(btn=>{
    const def=TOWERS.find(d=>d.id===btn.dataset.id);if(!def)return;
    const ul=wave>=def.unlock;const off=disabledTowers.has(def.id);
    btn.classList.toggle('locked',!ul);btn.classList.toggle('offlined',ul&&off);
    btn.classList.toggle('dis',ul&&!off&&gold<def.cost);btn.classList.toggle('sel',selectedTower===def.id);
    const lk=btn.querySelector('.lk');if(lk)lk.style.display=ul?'none':'flex';
    const nm=btn.querySelector('.nm');if(nm)nm.textContent=T(def,'name')||def.id;
  });
  const ib=document.getElementById('ib');
  if(selectedTower){
    const def=TOWERS.find(d=>d.id===selectedTower);
    if(def){ib.style.display='block';ib.textContent=L('tower_tip')(def);}
  } else ib.style.display='none';
}

function buildPanel(){
  const p=document.getElementById('tp');p.innerHTML='';
  TOWERS.forEach(def=>{
    if(def.sell)return; // skip sell
    const b=document.createElement('div');b.className='tb';b.dataset.id=def.id;
    const lk=(def.unlock>0)?'<div class="lk">🔒</div>':'';
    b.innerHTML=lk+'<span class="em">'+def.emoji+'</span><span class="nm">'+(T(def,'name')||def.id)+'</span><span class="ct">💰'+def.cost+'</span>';
    b.addEventListener('click',e=>{e.stopPropagation();if(wave<def.unlock)return;selectedTower=selectedTower===def.id?null:def.id;selectedForSell=null;updateUI();});
    p.appendChild(b);
  });
}

function s2g(cx,cy){const r=C.getBoundingClientRect();return{col:Math.floor((cx-r.left)*(IW/r.width)/TILE),row:Math.floor((cy-r.top)*(IH/r.height)/TILE),get ok(){return this.col>=0&&this.col<COLS&&this.row>=0&&this.row<ROWS}};}
C.addEventListener('click',e=>{if(!gameRunning||paused)return;const{col,row,ok}=s2g(e.clientX,e.clientY);if(ok)placeTower(col,row);});
C.addEventListener('mousemove',e=>{const{col,row,ok}=s2g(e.clientX,e.clientY);hoveredTile=ok?[col,row]:null;});
C.addEventListener('mouseleave',()=>{hoveredTile=null;});
let tsp=null,tm=false;
C.addEventListener('touchstart',e=>{e.preventDefault();if(paused)return;const t=e.touches[0];tsp={x:t.clientX,y:t.clientY};tm=false;const{col,row,ok}=s2g(t.clientX,t.clientY);if(ok)hoveredTile=[col,row];},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(!tsp)return;const t=e.touches[0];if(Math.abs(t.clientX-tsp.x)>8||Math.abs(t.clientY-tsp.y)>8)tm=true;const{col,row,ok}=s2g(t.clientX,t.clientY);hoveredTile=ok?[col,row]:null;},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(!gameRunning||tm||!tsp||paused){hoveredTile=null;tsp=null;return;}const{col,row,ok}=s2g(tsp.x,tsp.y);if(ok)placeTower(col,row);setTimeout(()=>{hoveredTile=null;},200);tsp=null;},{passive:false});
document.getElementById('sb').addEventListener('click',e=>{e.stopPropagation();speedMult=speedMult===1?2:speedMult===2?3:1;document.getElementById('sb').textContent='⏩'+speedMult+'x';});
let manualPause=false;
document.getElementById('pb').addEventListener('click',e=>{e.stopPropagation();manualPause=!manualPause;paused=manualPause||showingIntro;document.getElementById('pb').textContent=manualPause?'▶️':'⏸️';});
document.addEventListener('keydown',e=>{const n=parseInt(e.key);if(n>=1&&n<=TOWERS.length){const def=TOWERS[n-1];if(def&&wave>=def.unlock){selectedTower=selectedTower===def.id?null:def.id;updateUI();}}if(e.key==='Escape'){selectedTower=null;updateUI();}});

function generateScorecard(){
  const W=1200,H=630;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');

  // Hospital background
  const bg=c.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#d4dad6');bg.addColorStop(1,'#c0c8c2');
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Floor tile pattern
  const ts=40;
  for(let x=0;x<W;x+=ts)for(let y=0;y<H;y+=ts){
    c.fillStyle=((x/ts+y/ts)%2===0)?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.015)';
    c.fillRect(x,y,ts,ts);
  }

  // Subtle grid
  c.strokeStyle='rgba(0,0,0,0.03)';c.lineWidth=1;
  for(let x=0;x<=W;x+=ts){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<=H;y+=ts){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}

  // Top banner
  c.fillStyle='rgba(45,106,106,0.12)';
  c.fillRect(0,0,W,90);
  c.fillStyle='rgba(45,106,106,0.06)';
  c.fillRect(0,88,W,2);

  // Title
  c.font='bold 36px Figtree, sans-serif';c.fillStyle='#2D6A6A';c.textAlign='center';c.textBaseline='middle';
  c.fillText('🏥 '+L('sc_title'),W/2,50);

  // Central score area
  const cx=W/2, cy=260;

  // Big score circle
  c.beginPath();c.arc(cx,cy,100,0,Math.PI*2);
  c.fillStyle='rgba(45,106,106,0.08)';c.fill();
  c.strokeStyle='rgba(45,106,106,0.2)';c.lineWidth=3;c.stroke();

  c.font='bold 72px Figtree, sans-serif';c.fillStyle='#2a3a4a';c.textAlign='center';
  c.fillText(score.toString(),cx,cy+8);
  c.font='16px Figtree, sans-serif';c.fillStyle='#5a6a7c';
  c.fillText(L('sc_score').toUpperCase(),cx,cy-50);

  // Shifts survived (left)
  c.font='bold 48px Figtree, sans-serif';c.fillStyle='#2a3a4a';
  c.fillText(wave.toString(),cx-220,cy+5);
  c.font='14px Figtree, sans-serif';c.fillStyle='#5a6a7c';
  c.fillText(L('sc_survived'),cx-220,cy-35);
  c.fillText(L('sc_shifts'),cx-220,cy+35);

  // Top tower (right)
  let topTower=null,topKills=0;
  towers.forEach(t=>{if(t.kills>topKills){topKills=t.kills;topTower=t;}});
  c.font='44px serif';
  c.fillText(topTower?topTower.emoji:'🏥',cx+220,cy-5);
  c.font='14px Figtree, sans-serif';c.fillStyle='#5a6a7c';
  c.fillText(L('sc_top'),cx+220,cy-40);
  if(topTower){
    c.font='12px Figtree, sans-serif';c.fillStyle='#7a8a9c';
    c.fillText(T(topTower,'name')+' (×'+topKills+')',cx+220,cy+35);
  }

  // Divider line
  c.strokeStyle='rgba(0,0,0,0.06)';c.lineWidth=1;
  c.beginPath();c.moveTo(100,390);c.lineTo(W-100,390);c.stroke();

  // Quote
  c.font='italic 18px Special Elite, monospace';c.fillStyle='#6a5a48';c.textAlign='center';
  const quote=lastGoQuote||L('go_quotes')[0];
  // Word wrap
  const maxW=W-200;
  const words=quote.replace(/"/g,'').split(' ');
  let lines=[],line='';
  words.forEach(w=>{const test=line?line+' '+w:w;if(c.measureText(test).width>maxW){lines.push(line);line=w;}else line=test;});
  if(line)lines.push(line);
  c.font='italic 18px Special Elite, monospace';
  lines.forEach((l,i)=>{c.fillText('"'+l+(i===lines.length-1?'"':''),cx,420+i*28);});

  // CTA at bottom
  c.font='14px Figtree, sans-serif';c.fillStyle='#8a9aac';
  c.fillText(L('sc_cta'),cx,H-50);

  // Decorative emojis scattered
  c.globalAlpha=0.15;c.font='30px serif';
  const emojis=['💉','📟','⚡','🧊','💊','🪢','📢','🧲','👩‍⚕️','💻','🧓','📄','👔'];
  emojis.forEach((em,i)=>{
    const ex=60+((i*97)%11)/11*(W-120);
    const ey=100+((i*173)%7)/7*(H-200);
    c.fillText(em,ex,ey);
  });
  c.globalAlpha=1;

  // Bottom bar
  c.fillStyle='rgba(45,106,106,0.08)';c.fillRect(0,H-30,W,30);
  c.font='11px Figtree, sans-serif';c.fillStyle='rgba(45,106,106,0.5)';
  c.fillText('🏥 '+L('sc_title')+' · dotbase.org',cx,H-12);

  // Convert and download/share
  cv.toBlob(blob=>{
    if(!blob)return;
    const file=new File([blob],'hospital-defense-score.png',{type:'image/png'});
    // Try Web Share API first (mobile)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:L('sc_title'),text:L('sc_survived')+' '+wave+' '+L('sc_shifts')+' · '+L('sc_score')+': '+score}).catch(()=>{});
    } else {
      // Fallback: download
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='hospital-defense-score.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    }
  },'image/png');
}

function loop(ts){lastTime=ts;if(gameRunning)update();draw();requestAnimationFrame(loop);}
function startGame(){document.getElementById('ss').classList.add('hid');document.getElementById('go').classList.add('hid');init();gameRunning=true;waveTimer=60;resize();buildPanel();}

renderStartScreen();buildPanel();init();lastTime=performance.now();requestAnimationFrame(loop);draw();

// PWA Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
