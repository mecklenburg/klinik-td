let PATH=[],pathSet=new Set();

function generatePath(){
  PATH=[];pathSet=new Set();
  const r1=1+Math.floor(Math.random()*2);
  const t1x=Math.min(COLS-2,5+Math.floor(Math.random()*2));
  const t1y=Math.min(ROWS-4,4+Math.floor(Math.random()*2));
  const t2x=1+Math.floor(Math.random()*2);
  const t2y=Math.min(ROWS-4,t1y+2+Math.floor(Math.random()*2));
  const t3x=Math.min(COLS-2,6+Math.floor(Math.random()*2));
  const t4y=Math.min(ROWS-3,t2y+3+Math.floor(Math.random()*2));
  const exitX=Math.max(1,Math.min(COLS-2,2+Math.floor(Math.random()*3)));
  for(let x=0;x<=t1x;x++) PATH.push([x,r1]);
  for(let y=r1+1;y<=t1y;y++) PATH.push([t1x,y]);
  for(let x=t1x-1;x>=t2x;x--) PATH.push([x,t1y]);
  for(let y=t1y+1;y<=t2y;y++) PATH.push([t2x,y]);
  for(let x=t2x+1;x<=t3x;x++) PATH.push([x,t2y]);
  for(let y=t2y+1;y<=t4y;y++) PATH.push([t3x,y]);
  for(let x=t3x-1;x>=exitX;x--) PATH.push([x,t4y]);
  for(let y=t4y+1;y<=ROWS-1;y++) PATH.push([exitX,y]);
  PATH=PATH.map(([x,y])=>[Math.max(0,Math.min(COLS-1,x)),Math.max(0,Math.min(ROWS-1,y))]);
  pathSet.clear();
  PATH.forEach(([x,y])=>pathSet.add(x+','+y));
}
function pathPos(p){const i=Math.min(Math.floor(p),PATH.length-2),t=p-i;const[x1,y1]=PATH[i],[x2,y2]=PATH[Math.min(i+1,PATH.length-1)];return{x:(x1+(x2-x1)*t+.5)*TILE,y:(y1+(y2-y1)*t+.5)*TILE};}

let selectedTower=null,gameRunning=false,waveTimer=0,spawnQueue=[],speedMult=1,lastTime=0,hoveredTile=null,tick=0;
let seenEnemies=new Set(),seenTowers=new Set(),seenMutators=new Set();
let introQueue=[],showingIntro=false,paused=false;
let activeMutators=[],activeTowerEffects={},disabledTowers=new Set();
let lastGoQuote='',manualPause=false;

function init(){gold=150;lives=20;score=0;wave=0;enemies=[];towers=[];projectiles=[];particles=[];floatingTexts=[];spawnQueue=[];waveTimer=0;tick=0;seenEnemies=new Set();seenTowers=new Set();seenMutators=new Set();introQueue=[];showingIntro=false;paused=false;activeMutators=[];activeTowerEffects={rangeMult:1,rateMult:1};disabledTowers=new Set();manualPause=false;if(document.getElementById('pb'))document.getElementById('pb').textContent='⏸️';tutorialActive=false;tutorialHintTile=null;selectedForSell=null;generatePath();updateUI();}
let tutorialActive=false,tutorialHintTile=null;

function queueIntro(type,emoji,name,quote,stats){introQueue.push({type,emoji,name,quote,stats});if(!showingIntro)showNextIntro();}
function showNextIntro(){
  if(introQueue.length===0){showingIntro=false;return;}
  showingIntro=true;paused=true;
  const item=introQueue.shift();
  if(item.isShiftCard){
    showingIntro=false;
    showShiftCard(item.upkeep);
    return;
  }
  const card=document.getElementById('intro-card');
  const typeEl=document.getElementById('ic-type');
  document.getElementById('ic-emoji').textContent=item.emoji;
  typeEl.textContent=item.type;
  document.getElementById('ic-name').textContent=item.name;
  document.getElementById('ic-quote').textContent=item.quote;
  document.getElementById('ic-stats').textContent=item.stats||'';
  // Visual type distinction
  const isEquip=item.type===L('new_equip');
  const isCrisis=item.type===L('crisis');
  card.classList.remove('threat');
  typeEl.className='ic-type';
  if(isEquip){typeEl.classList.add('equip-type');card.style.borderLeftColor='#1a1a1a';}
  else if(isCrisis){typeEl.classList.add('crisis-type');card.style.borderLeftColor='#d4820a';card.classList.add('threat');}
  else{typeEl.classList.add('threat-type');card.style.borderLeftColor='#c0392b';card.classList.add('threat');}
  card.classList.add('show');
}
document.getElementById('intro-card').addEventListener('click',()=>{document.getElementById('intro-card').classList.remove('show');setTimeout(showNextIntro,150);});
document.getElementById('intro-card').addEventListener('touchend',e=>{e.preventDefault();document.getElementById('intro-card').classList.remove('show');setTimeout(showNextIntro,150);});

function genWave(w){
  const q=[];const isBoss=w%5===0&&w>0;
  if(isBoss){const bi=Math.min(Math.floor(w/5)-1,3);const boss=ETYPES[6+bi];const bc=Math.max(1,Math.floor(w/10));for(let i=0;i<bc;i++)q.push({type:boss,delay:i*60});const mc=Math.floor(w*1.2)+4;const mxR=Math.min(3+Math.floor(w/4),w>=15?19:w>=12?19:w>=10?19:6);const av=ETYPES.slice(0,mxR).filter(e=>!e.boss);for(let i=0;i<mc;i++)q.push({type:av[Math.floor(Math.random()*av.length)],delay:bc*60+i*12});}
  else{
    let count,mxR;
    if(w<=3){count=3+w;mxR=Math.min(w,2);}
    else if(w<=6){count=5+Math.floor(w*1.2);mxR=Math.min(2+Math.floor(w/2),6);}
    else{count=5+Math.floor(w*1.8)+Math.floor(w*w*.03);mxR=Math.min(2+Math.floor(w/2),w>=15?19:w>=12?19:w>=10?19:6);}
    const av=ETYPES.slice(0,mxR).filter(e=>!e.boss);for(let i=0;i<count;i++)q.push({type:av[Math.floor(Math.random()*av.length)],delay:i*(w<=3?25:w<=6?18:15)});
  }
  const hpS=w<=5?1:w<=10?1+(w-5)*.15:w<=20?1+5*.15+Math.pow(w-10,1.3)*.15:1+5*.15+Math.pow(10,1.3)*.15+Math.pow(w-20,1.6)*.2;
  const earlyBonus=w<=5?1.5:w<=8?1.2:1;
  const lateSpd=w>=20?1+((w-20)*.04):w>=15?1+((w-15)*.02):1;
  const lateArmor=w>=25?.15+(w-25)*.02:w>=20?.05+(w-20)*.02:0;
  q.forEach(e=>{e.hpM=hpS;e.spdMult=(w<=3?.8:1)*lateSpd;e.rewardMult=earlyBonus;e.armorAdd=Math.min(lateArmor,.5);});
  activeMutators=[];activeTowerEffects={rangeMult:1,rateMult:1};disabledTowers=new Set();
  let nm=0;if(w>=30)nm=Math.min(2+Math.floor((w-30)/5),4);else if(w>=25)nm=Math.min(1+Math.floor((w-25)/6),3);else if(w>=15)nm=Math.min(1+Math.floor((w-15)/7),2);else if(w>=8)nm=1;
  if(nm>0){let mt=w>=25?3:w>=15?2:1;const pool=MUTATORS.filter(m=>m.tier<=mt).slice();for(let i=0;i<nm&&pool.length;i++){const idx=Math.floor(Math.random()*pool.length);const mut=pool.splice(idx,1)[0];activeMutators.push(mut);mut.apply(q);if(mut.towerEffect){if(mut.towerEffect.rangeMult)activeTowerEffects.rangeMult*=mut.towerEffect.rangeMult;if(mut.towerEffect.rateMult)activeTowerEffects.rateMult*=mut.towerEffect.rateMult;}if(mut.disable)mut.disable.forEach(id=>disabledTowers.add(id));}}
  return q;
}

let pendingSpawnQueue=[];

function startWave(){
  wave++;
  // Upkeep calc
  const upRate=wave>=20?.12:wave>=15?.1:.08;
  const up=towers.reduce((s,t)=>s+Math.floor(t.cost*upRate),0);
  if(up>0&&wave>1) gold=Math.max(0,gold-up);

  // Gen wave (sets mutators/disabled) — but don't start spawning yet
  pendingSpawnQueue=genWave(wave);

  // Pause immediately
  paused=true;

  // Tower unlocks
  TOWERS.forEach(t=>{if(t.unlock===wave&&!t.sell&&!seenTowers.has(t.id)){seenTowers.add(t.id);queueIntro(L('new_equip'),t.emoji,T(t,'introName')||t.name,T(t,'intro')||'','Cost: '+t.cost+'💰 · DMG: '+t.dmg+' · Range: '+t.range);}});

  // Enemy intros
  const seen2=new Set(pendingSpawnQueue.map(e=>e.type.idx));
  seen2.forEach(idx=>{if(!seenEnemies.has(idx)){seenEnemies.add(idx);const et=ETYPES[idx];const stats='HP: '+et.hp+' · SPD: '+et.spd+(et.boss?' · ⚠️ BOSS':'')+(et.flying?' · ✈️':'')+(et.armor?' · 🛡️':'')+(et.healer?' · 💚':'');queueIntro(et.boss?L('boss_incoming'):L('new_threat'),et.emoji,E(idx,'introName')||'?',E(idx,'intro')||'',stats);}});

  // Mutator intros
  activeMutators.forEach(m=>{if(m.disable&&!seenMutators.has(m.id)){seenMutators.add(m.id);const flav=M(m.id,'flavor')||'';if(flav)queueIntro(L('crisis'),M(m.id,'name')||'?',M(m.id,'name'),flav,M(m.id,'desc'));}});

  // Queue the shift card to show AFTER all intros are done
  queueShiftCard(up);

  // Banner (visible during gameplay)
  const mb=document.getElementById('mutator-bar');
  if(activeMutators.length>0){mb.style.display='flex';mb.innerHTML=activeMutators.map(m=>'<span class="mut-pill'+(m.disable?' disable':'')+'">'+M(m.id,'name')+': '+M(m.id,'desc')+'</span>').join('');}else mb.style.display='none';

  updateUI();
}

function queueShiftCard(upkeep){
  // Add the shift card as a special item in the intro queue
  introQueue.push({isShiftCard:true,upkeep:upkeep});
  if(!showingIntro) showNextIntro();
}

function showShiftCard(upkeep){
  const sc=document.getElementById('shift-card');
  document.getElementById('sc-title').textContent='\u26a1 '+L('sc_shift')(wave);
  
  const isBoss=wave%5===0&&wave>0;
  document.getElementById('sc-narrative').textContent=L('shift_flavor')(wave,isBoss,gold,towers);

  // Status row — gold always, upkeep only if >0
  document.getElementById('sc-gold').textContent=L('sc_gold')(gold);
  const upEl=document.getElementById('sc-upkeep');
  if(upkeep>0&&wave>1){upEl.textContent=L('sc_upkeep')(upkeep);upEl.style.display='';}
  else upEl.style.display='none';

  // Mutators
  const mutBox=document.getElementById('sc-mutators');
  if(activeMutators.length>0){
    mutBox.style.display='flex';
    let html='';
    activeMutators.forEach(m=>{
      html+='<span class="mut-pill'+(m.disable?' disable':'')+'">'+M(m.id,'name')+': '+M(m.id,'desc')+'</span>';
      if(!seenMutators.has(m.id+'_explained')){
        seenMutators.add(m.id+'_explained');
        const expl=M(m.id,'explain')||'';
        if(expl) html+='<div style="width:100%;font-size:10px;color:#888;margin:2px 0 4px;font-style:italic">'+expl+'</div>';
      }
    });
    mutBox.innerHTML=html;
  } else mutBox.style.display='none';

  // Tutorial
  const tut=document.getElementById('sc-tutorial');
  if(wave<=3){tut.style.display='block';tut.textContent=wave===1?L('tutorial'):wave===2?L('tutorial2'):L('tutorial3');}
  else tut.style.display='none';

  sc.querySelector('.pbtn').textContent=L('sc_resume');
  sc.classList.remove('hid');
}

function dismissShiftCard(){
  document.getElementById('shift-card').classList.add('hid');
  spawnQueue=pendingSpawnQueue;pendingSpawnQueue=[];
  waveTimer=0;paused=manualPause;showingIntro=false;
  showAnnounce(wave%5===0?L('boss_wave')(wave):L('norm_wave')(wave));
  if(wave===1&&!localStorage.getItem('kraft_cafe_played')){
    selectedTower=TOWERS[0].id;tutorialHintTile=null;
    for(let i=2;i<Math.min(PATH.length,15);i++){
      const[px,py]=PATH[i];
      const candidates=[[px-1,py],[px+1,py],[px,py-1],[px,py+1]];
      for(const[cx,cy] of candidates){
        if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS&&!pathSet.has(cx+','+cy)&&!towers.find(t=>t.col===cx&&t.row===cy)){
          tutorialHintTile=[cx,cy];break;}}
      if(tutorialHintTile)break;}
    tutorialActive=true;updateUI();}
}

function showAnnounce(t){const el=document.getElementById('wa');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
function showCombo(t){const el=document.getElementById('cf');el.textContent='⚡ '+t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function floatText(x,y,t,c){floatingTexts.push({x,y,text:t,color:c,life:40,maxLife:40});}

function spawnEnemy(td,hm,sM,rM,aA){enemies.push({x:0,y:0,progress:0,hp:td.hp*hm,maxHp:td.hp*hm,spd:td.spd*(sM||1),baseSpd:td.spd*(sM||1),reward:Math.ceil((td.reward+Math.floor(wave/5))*(rM||1)),color:td.color,emoji:td.emoji,boss:td.boss||false,size:td.size||1,animType:td.animType||'bob',flying:td.flying||false,armor:Math.min((td.armor||0)+(aA||0),.6),healer:td.healer||false,tags:td.tags||[],splitter:td.splitter||false,shielder:td.shielder||false,copier:td.copier||false,resurge:td.resurge||false,hasResurged:false,rusher:td.rusher||false,disabler:td.disabler||false,regen:td.regen||false,burnImmune:td.burnImmune||false,goldDrain:td.goldDrain||false,spawner:td.spawner||false,splashOnly:td.splashOnly||false,slowImmune:td.slowImmune||false,disableCooldown:0,slowTimer:0,burnTimer:0,burnDmg:0,rootTimer:0,animPhase:Math.random()*Math.PI*2});}

function getAdj(c,r){const s=new Set();towers.forEach(t=>{if(t.sell)return;const dx=Math.abs(t.col-c),dy=Math.abs(t.row-r);if(dx<=1&&dy<=1&&!(dx===0&&dy===0))s.add(t.id);});return s;}
function checkCombo(tw){const adj=getAdj(tw.col,tw.row);for(const c of COMBOS)if((tw.id===c.a&&adj.has(c.b))||(tw.id===c.b&&adj.has(c.a)))return c;return null;}
function getAura(tw){let m=1;towers.forEach(t=>{if(t.aura&&t!==tw){const dx=Math.abs(t.col-tw.col),dy=Math.abs(t.row-tw.row);if(dx<=t.aura.range&&dy<=t.aura.range)m*=t.aura.dmgMult;}});return m;}

let selectedForSell=null;

function showTowerPanel(tw){
  selectedForSell={col:tw.col,row:tw.row};
  const panel=document.getElementById('tower-panel');
  const name=T(tw,'name')||tw.id;const lvl=tw.level||1;
  const upgCost=Math.floor(tw.baseCost*.6);const canUpg=lvl<3&&gold>=upgCost;
  const sellVal=Math.floor(tw.cost/2);
  document.getElementById('tp-header').textContent=tw.emoji+' '+name+(lvl>=3?' \u2605':' Lv'+lvl);
  document.getElementById('tp-desc').textContent=T(tw,'desc')||tw.desc||'';
  let sh='<div style="background:rgba(0,0,0,.04);padding:4px 10px;border-radius:8px;text-align:center"><div style="font-size:10px;opacity:.5">DMG</div><b>'+tw.dmg+'</b>';
  if(lvl<3){sh+='<div style="font-size:9px;color:#1a1a1a">\u2192 '+Math.round(tw.baseDmg*(1+.35*lvl))+'</div>';}
  sh+='</div><div style="background:rgba(0,0,0,.04);padding:4px 10px;border-radius:8px;text-align:center"><div style="font-size:10px;opacity:.5">RNG</div><b>'+tw.range+'</b>';
  if(lvl<3){sh+='<div style="font-size:9px;color:#1a1a1a">\u2192 '+ +(tw.baseRange*(1+.15*lvl)).toFixed(1)+'</div>';}
  sh+='</div><div style="background:rgba(0,0,0,.04);padding:4px 10px;border-radius:8px;text-align:center"><div style="font-size:10px;opacity:.5">KILLS</div><b>'+tw.kills+'</b></div>';
  document.getElementById('tp-stats').innerHTML=sh;
  let b='';
  if(lvl<3){b+='<button onclick="doUpgrade()" style="flex:1;font-family:Figtree,sans-serif;font-size:13px;font-weight:700;padding:8px 12px;border-radius:12px;border:none;cursor:pointer;'+(canUpg?'background:linear-gradient(135deg,#ffd700,#e6b800);color:#1a1a1a;':'background:rgba(0,0,0,.06);color:#aaa;')+'"'+(canUpg?'':' disabled')+'>⬆️ Upgrade (\ud83d\udcb0'+upgCost+')</button>';}
  b+='<button onclick="doSell()" style="font-family:Figtree,sans-serif;font-size:13px;font-weight:600;padding:8px 14px;border-radius:12px;border:1px solid rgba(200,60,40,.2);cursor:pointer;background:rgba(200,60,40,.06);color:#c0392b;">\ud83d\uddd1\ufe0f +'+sellVal+'\ud83d\udcb0</button>';
  document.getElementById('tp-buttons').innerHTML=b;
  panel.style.display='block';document.getElementById('tp-backdrop').style.display='block';
}
function closeTowerPanel(){document.getElementById('tower-panel').style.display='none';document.getElementById('tp-backdrop').style.display='none';selectedForSell=null;updateUI();}
function doUpgrade(){if(!selectedForSell)return;const tw=towers.find(t=>t.col===selectedForSell.col&&t.row===selectedForSell.row);if(!tw)return;const upgCost=Math.floor(tw.baseCost*.6);if(tw.level<3&&gold>=upgCost){gold-=upgCost;tw.level++;tw.dmg=Math.round(tw.baseDmg*(1+.35*(tw.level-1)));tw.range=+(tw.baseRange*(1+.15*(tw.level-1))).toFixed(2);tw.cost+=upgCost;spawnP(tw.x,tw.y,'#ffd700',12);floatText(tw.x,tw.y-10,L('upgrade_text'),'#ffd700');}closeTowerPanel();}
function doSell(){if(!selectedForSell)return;const tw=towers.find(t=>t.col===selectedForSell.col&&t.row===selectedForSell.row);if(!tw)return;const sv=Math.floor(tw.cost/2);gold+=sv;towers=towers.filter(t=>t!==tw);spawnP(tw.x,tw.y,'#74b9ff',8);floatText(tw.x,tw.y,'+'+sv+'\ud83d\udcb0','#2ecc71');closeTowerPanel();}

function placeTower(col,row){
  const existing=towers.find(t=>t.col===col&&t.row===row);
  if(existing){selectedTower=null;showTowerPanel(existing);updateUI();return;}
  closeTowerPanel();
  if(!selectedTower)return;const def=TOWERS.find(d=>d.id===selectedTower);if(!def)return;
  if(def.unlock>wave||disabledTowers.has(def.id)||pathSet.has(col+','+row)||gold<def.cost)return;
  gold-=def.cost;const tw={col,row,x:(col+.5)*TILE,y:(row+.5)*TILE,...def,cooldown:0,angle:0,kills:0,level:1,baseCost:def.cost,baseDmg:def.dmg,baseRange:def.range};towers.push(tw);spawnP(tw.x,tw.y,def.color,10);
  if(tutorialActive){tutorialActive=false;tutorialHintTile=null;try{localStorage.setItem('kraft_cafe_played','1');}catch(e){}}
  const combo=checkCombo(tw);if(combo){const cn=TX[lang].combos[combo.effect]||combo.effect;showCombo(cn);}updateUI();
}
function lightenColor(hex){try{const r=Math.min(255,parseInt(hex.slice(1,3),16)+40);const g=Math.min(255,parseInt(hex.slice(3,5),16)+40);const b=Math.min(255,parseInt(hex.slice(5,7),16)+40);return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}catch(e){return hex;}}

function fire(tw,tgt){
  const am=getAura(tw);let dmg=tw.dmg*am;const combo=checkCombo(tw);
  if(combo&&combo.effect==='grandrounds')tw.cooldown=Math.floor(tw.rate/3);
  // dotbase: massive bonus vs admin/document/repetitive tags
  if(tw.dotbase){
    const isAdmin=tgt.tags&&(tgt.tags.includes('admin')||tgt.tags.includes('influencer')||tgt.tags.includes('repetitive'));
    const mult=isAdmin?4:1;
    dmg*=mult;
    // AoE dissolve effect on all nearby admin/doc targets
    if(isAdmin){
      enemies.forEach(o=>{if(o!==tgt&&o.tags&&(o.tags.includes('admin')||o.tags.includes('influencer'))&&Math.sqrt((o.x-tgt.x)**2+(o.y-tgt.y)**2)<2*TILE){o.hp-=dmg*.3;spawnP(o.x,o.y,'#6f4e37',3);}});
    }
    // Cool teal dissolve beam
    particles.push({x:tw.x,y:tw.y,x2:tgt.x,y2:tgt.y,life:12,maxLife:12,beam:true,color:'#1a1a1a',width:isAdmin?4:2});
    // Secondary sparkle beam
    particles.push({x:tw.x,y:tw.y,x2:tgt.x,y2:tgt.y,life:8,maxLife:8,beam:true,color:'#6f4e37',width:isAdmin?2:1});
    if(isAdmin){spawnP(tgt.x,tgt.y,'#6f4e37',6);floatText(tgt.x,tgt.y-15,'BESTELLT!','#6f4e37');}
    dealDmg(tgt,dmg,tw,combo);
    // digitalnurse combo: dotbase+nurse adjacent = also slow admin targets
    if(combo&&combo.effect==='digitalnurse'){enemies.forEach(o=>{if(o.tags&&o.tags.includes('admin')&&!o.slowImmune&&o.slowTimer<=0&&Math.sqrt((o.x-tgt.x)**2+(o.y-tgt.y)**2)<2.5*TILE){o.slowTimer=80;o.spd=o.baseSpd*.4;}});spawnP(tgt.x,tgt.y,'#ff6b81',5);}
    return;
  }
  if(tw.beam){const bw=(tw.id==='robii'?3:2)+((tw.level||1)-1);const bc=(tw.level||1)>=3?'#ffd700':(tw.level||1)>=2?lightenColor(tw.projC):tw.projC;dealDmg(tgt,dmg,tw,combo);particles.push({x:tw.x,y:tw.y,x2:tgt.x,y2:tgt.y,life:10,maxLife:10,beam:true,color:bc,width:bw});}
  else if(tw.chain){let h=[tgt];dealDmg(tgt,dmg,tw,combo);let pv=tgt;const chainRange=(tw.id==='callout'?3.5:2.5)*TILE;for(let c=0;c<tw.chain;c++){let cl=null,cd=Infinity;enemies.forEach(e=>{if(h.includes(e)||e.hp<=0)return;const dx=e.x-pv.x,dy=e.y-pv.y,d=Math.sqrt(dx*dx+dy*dy);if(d<chainRange&&d<cd){cl=e;cd=d;}});if(cl){h.push(cl);dealDmg(cl,dmg*.6,tw,combo);particles.push({x:pv.x,y:pv.y,x2:cl.x,y2:cl.y,life:8,maxLife:8,beam:true,color:tw.id==='callout'?'#fdcb6e':'#ffeaa7',width:tw.id==='callout'?2:1.5});pv=cl;}}}
  else{const lvlMult=tw.level||1;const pSize=tw.projS*(1+(lvlMult-1)*.4);const pColor=lvlMult>=3?'#ffd700':lvlMult>=2?lightenColor(tw.projC):tw.projC;projectiles.push({x:tw.x,y:tw.y,tx:tgt.x,ty:tgt.y,target:tgt,speed:5,damage:dmg,splash:tw.splash||0,slow:tw.slow||0,burn:tw.burn||null,root:tw.root||null,color:pColor,size:pSize,combo,pctDmg:tw.pctDmg||0,level:lvlMult,emoji:tw.projEmoji||null});}
}

function dealDmg(e,dmg,tw,combo){
  if(e.splashOnly&&tw&&!tw.splash&&!tw.beam&&!tw.burn&&!tw.pctDmg&&!combo){return;}
  const ad=dmg*(1-e.armor);if(tw&&tw.pctDmg)e.hp-=e.maxHp*tw.pctDmg;e.hp-=ad;
  if(tw&&tw.slow&&e.slowTimer<=0&&!e.slowImmune){e.spd=e.baseSpd*(1-Math.min(tw.slow,.5));e.slowTimer=60;}
  if(tw&&tw.burn){e.burnDmg=tw.burn.dmg;e.burnTimer=tw.burn.dur;}
  if(tw&&tw.root&&e.rootTimer<=0){e.rootTimer=tw.root.dur;e.spd=0;}
  if(combo){switch(combo.effect){
    case'steam':enemies.forEach(o=>{if(o===e)return;const dx=o.x-e.x,dy=o.y-e.y;if(Math.sqrt(dx*dx+dy*dy)<2*TILE){o.hp-=8;if(!o.slowImmune&&o.slowTimer<=0){o.slowTimer=60;o.spd=o.baseSpd*.5;}}});spawnP(e.x,e.y,'#b2bec3',12);break;
    case'chainspore':enemies.forEach(o=>{if(o!==e&&Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<2*TILE)o.hp-=dmg*.4;});spawnP(e.x,e.y,'#a29bfe',8);break;
    case'thunderroot':enemies.forEach(o=>{if(o===e)return;if(Math.sqrt((o.x-e.x)**2+(o.y-e.y)**2)<2*TILE){if(!o.slowImmune&&o.rootTimer<=0){o.rootTimer=50;o.spd=0;}o.hp-=10;}});spawnP(e.x,e.y,'#ffeaa7',10);break;

6,${rp})`;X.lineWidth=1.5;X.beginPath();X.arc(dx2,dy2,11*e.size,tick*.03,tick*.03+Math.PI*1.2);X.stroke();}if(e.burnImmune&&e.burnTimer<=0){X.font='7px serif';X.textAlign='center';X.fillText('🔥',dx2-9,dy2+10);X.strokeStyle='rgba(200,50,50,.4)';X.lineWidth=1.5;X.beginPath();X.moveTo(dx2-12,dy2+7);X.lineTo(dx2-6,dy2+13);X.stroke();}if(e.goldDrain){X.fillStyle=`rgba(255,215,0,${.08+Math.sin(tick*.06)*.05})`;X.beginPath();X.arc(dx2,dy2,3*TILE,0,Math.PI*2);X.fill();if(tick%50<25){X.font='7px serif';X.fillText('💰',dx2+12,dy2-10);}}if(e.spawner){X.strokeStyle=`rgba(231,76,60,${.15+Math.sin(tick*.1)*.08})`;X.lineWidth=1.5;X.beginPath();X.arc(dx2,dy2,12*e.size,0,Math.PI*2);X.stroke();}if(e.slowImmune){X.font='7px serif';X.textAlign='center';X.fillText('❄️',dx2+11,dy2+11);X.strokeStyle='rgba(100,100,200,.4)';X.lineWidth=1.5;X.beginPath();X.moveTo(dx2+8,dy2+8);X.lineTo(dx2+14,dy2+14);X.stroke();}if(e.splashOnly){X.strokeStyle=`rgba(142,68,173,${.2+Math.sin(tick*.07)*.1})`;X.lineWidth=2;X.setLineDash([2,4]);X.beginPath();X.arc(dx2,dy2,11*e.size,0,Math.PI*2);X.stroke();X.setLineDash([]);}X.save();X.translate(dx2,dy2);X.scale(sc*e.size,sc*e.size);X.font=`${e.boss?24:17}px serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(e.emoji,0,0);X.restore();const bw=e.boss?26:16;const hp=e.hp/e.maxHp;const by=dy2-(e.boss?17:12)*e.size;X.fillStyle='rgba(0,0,0,.35)';X.fillRect(dx2-bw/2,by,bw,3);X.fillStyle=hp>.5?'#00b894':hp>.25?'#fdcb6e':'#d63031';X.fillRect(dx2-bw/2,by,bw*Math.max(0,hp),3);if(e.boss){X.font='9px serif';X.textAlign='center';X.fillText('⚠️',dx2,by-5);}if(e.armor>0){X.font='7px serif';X.fillText('🛡️',dx2+bw/2+4,by+2);}});
  projectiles.forEach(p=>{const lvl=p.level||1;if(p.emoji){const sz=7+lvl*2;X.font=sz+'px serif';X.textAlign='center';X.textBaseline='middle';X.fillText(p.emoji,p.x,p.y);if(lvl>=2){X.globalAlpha=.25;X.fillText(p.emoji,p.x+2,p.y-2);X.globalAlpha=1;}}else{X.fillStyle=p.color;X.shadowColor=p.color;X.shadowBlur=4+lvl*3;X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();if(lvl>=2){X.globalAlpha=.3;X.beginPath();X.arc(p.x,p.y,p.size*1.8,0,Math.PI*2);X.fill();X.globalAlpha=1;}X.shadowBlur=0;}});
  particles.forEach(p=>{const a=p.life/p.maxLife;if(p.beam){X.strokeStyle=p.color+Math.floor(a*180).toString(16).padStart(2,'0');X.lineWidth=p.width||2;X.beginPath();X.moveTo(p.x,p.y);X.lineTo(p.x2,p.y2);X.stroke();}else{X.globalAlpha=a;X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();X.globalAlpha=1;}});
  floatingTexts.forEach(f=>{const a=f.life/f.maxLife;X.globalAlpha=a;X.fillStyle=f.color;X.font='bold 10px Figtree,sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText(f.text,f.x,f.y);X.globalAlpha=1;});
  // Law at bottom
  document.getElementById('law').textContent=L('laws')[wave%L('laws').length]||'';
}

function updateUI(){
  document.getElementById('gd').textContent=gold;document.getElementById('wd').textContent=wave;document.getElementById('ld').textContent=lives;document.getElementById('sd').textContent=score;
  document.querySelectorAll('.tb').forEach(btn=>{
    const def=TOWERS.find(d=>d.id===btn.dataset.id);if(!def)return;
    const ul=wave>=def.unlock;const off=disabledTowers.has(def.id);
    btn.classList.toggle('locked',!ul);btn.classList.toggle('offlined',ul&&off);
    btn.classList.toggle('dis',ul&&!off&&gold<def.cost);btn.classList.toggle('sel',selectedTower===def.id);
    const lk=btn.querySelector('.lk');if(lk)lk.style.display=ul?'none':'flex';
    const nm=btn.querySelector('.nm');if(nm)nm.textContent=T(def,'name')||def.id;
  });
  const ib=document.getElementById('ib');
  if(selectedTower){
    const def=TOWERS.find(d=>d.id===selectedTower);
    if(def){ib.style.display='block';ib.textContent=L('tower_tip')(def);}
  } else ib.style.display='none';
}

function buildPanel(){
  const p=document.getElementById('tp');p.innerHTML='';
  TOWERS.forEach(def=>{
    if(def.sell)return; // skip sell
    const b=document.createElement('div');b.className='tb';b.dataset.id=def.id;
    const lk=(def.unlock>0)?'<div class="lk">🔒</div>':'';
    b.innerHTML=lk+'<span class="em">'+def.emoji+'</span><span class="nm">'+(T(def,'name')||def.id)+'</span><span class="ct">💰'+def.cost+'</span>';
    b.addEventListener('click',e=>{e.stopPropagation();if(wave<def.unlock)return;selectedTower=selectedTower===def.id?null:def.id;selectedForSell=null;updateUI();});
    p.appendChild(b);
  });
}

function s2g(cx,cy){const r=C.getBoundingClientRect();return{col:Math.floor((cx-r.left)*(IW/r.width)/TILE),row:Math.floor((cy-r.top)*(IH/r.height)/TILE),get ok(){return this.col>=0&&this.col<COLS&&this.row>=0&&this.row<ROWS}};}
C.addEventListener('click',e=>{if(!gameRunning||paused)return;const{col,row,ok}=s2g(e.clientX,e.clientY);if(ok)placeTower(col,row);});
C.addEventListener('mousemove',e=>{const{col,row,ok}=s2g(e.clientX,e.clientY);hoveredTile=ok?[col,row]:null;});
C.addEventListener('mouseleave',()=>{hoveredTile=null;});
let tsp=null,tm=false;
C.addEventListener('touchstart',e=>{e.preventDefault();if(paused)return;const t=e.touches[0];tsp={x:t.clientX,y:t.clientY};tm=false;const{col,row,ok}=s2g(t.clientX,t.clientY);if(ok)hoveredTile=[col,row];},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(!tsp)return;const t=e.touches[0];if(Math.abs(t.clientX-tsp.x)>8||Math.abs(t.clientY-tsp.y)>8)tm=true;const{col,row,ok}=s2g(t.clientX,t.clientY);hoveredTile=ok?[col,row]:null;},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(!gameRunning||tm||!tsp||paused){hoveredTile=null;tsp=null;return;}const{col,row,ok}=s2g(tsp.x,tsp.y);if(ok)placeTower(col,row);setTimeout(()=>{hoveredTile=null;},200);tsp=null;},{passive:false});
document.getElementById('sb').addEventListener('click',e=>{e.stopPropagation();speedMult=speedMult===1?2:speedMult===2?3:1;document.getElementById('sb').textContent='⏩'+speedMult+'x';});
document.getElementById('pb').addEventListener('click',e=>{e.stopPropagation();manualPause=!manualPause;paused=manualPause||showingIntro;document.getElementById('pb').textContent=manualPause?'▶️':'⏸️';});
document.addEventListener('keydown',e=>{const n=parseInt(e.key);if(n>=1&&n<=TOWERS.length){const def=TOWERS[n-1];if(def&&wave>=def.unlock){selectedTower=selectedTower===def.id?null:def.id;updateUI();}}if(e.key==='Escape'){selectedTower=null;updateUI();}});

function generateScorecard(){
  const W=1200,H=630;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');

  // Hospital background
  const bg=c.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#e8ddd0');bg.addColorStop(1,'#dccebb');
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Floor tile pattern
  const ts=40;
  for(let x=0;x<W;x+=ts)for(let y=0;y<H;y+=ts){
    c.fillStyle=((x/ts+y/ts)%2===0)?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.015)';
    c.fillRect(x,y,ts,ts);
  }

  // Subtle grid
  c.strokeStyle='rgba(0,0,0,0.03)';c.lineWidth=1;
  for(let x=0;x<=W;x+=ts){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<=H;y+=ts){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}

  // Top banner - KRAFT black
  c.fillStyle='rgba(26,26,26,0.95)';
  c.fillRect(0,0,W,90);

  // Title in KRAFT yellow
  c.font='bold 36px Figtree, sans-serif';c.fillStyle='#FFD600';c.textAlign='center';c.textBaseline='middle';
  c.fillText('⚡ '+L('sc_title'),W/2,50);

  // Central score area
  const cx=W/2, cy=260;

  // Big score circle
  c.beginPath();c.arc(cx,cy,100,0,Math.PI*2);
  c.fillStyle='rgba(58,34,24,0.08)';c.fill();
  c.strokeStyle='rgba(58,34,24,0.2)';c.lineWidth=3;c.stroke();

  c.font='bold 72px Figtree, sans-serif';c.fillStyle='#1a1a1a';c.textAlign='center';
  c.fillText(score.toString(),cx,cy+8);
  c.font='16px Figtree, sans-serif';c.fillStyle='#6a5040';
  c.fillText(L('sc_score').toUpperCase(),cx,cy-50);

  // Shifts survived (left)
  c.font='bold 48px Figtree, sans-serif';c.fillStyle='#1a1a1a';
  c.fillText(wave.toString(),cx-220,cy+5);
  c.font='14px Figtree, sans-serif';c.fillStyle='#6a5040';
  c.fillText(L('sc_survived'),cx-220,cy-35);
  c.fillText(L('sc_shifts'),cx-220,cy+35);

  // Top tower (right)
  let topTower=null,topKills=0;
  towers.forEach(t=>{if(t.kills>topKills){topKills=t.kills;topTower=t;}});
  c.font='44px serif';
  c.fillText(topTower?topTower.emoji:'☕',cx+220,cy-5);
  c.font='14px Figtree, sans-serif';c.fillStyle='#6a5040';
  c.fillText(L('sc_top'),cx+220,cy-40);
  if(topTower){
    c.font='12px Figtree, sans-serif';c.fillStyle='#7a8a9c';
    c.fillText(T(topTower,'name')+' (×'+topKills+')',cx+220,cy+35);
  }

  // Divider line
  c.strokeStyle='rgba(0,0,0,0.06)';c.lineWidth=1;
  c.beginPath();c.moveTo(100,390);c.lineTo(W-100,390);c.stroke();

  // Quote
  c.font='italic 18px Playfair Display, serif';c.fillStyle='#6a5040';c.textAlign='center';
  const quote=lastGoQuote||L('go_quotes')[0];
  // Word wrap
  const maxW=W-200;
  const words=quote.replace(/"/g,'').split(' ');
  let lines=[],line='';
  words.forEach(w=>{const test=line?line+' '+w:w;if(c.measureText(test).width>maxW){lines.push(line);line=w;}else line=test;});
  if(line)lines.push(line);
  c.font='italic 18px Playfair Display, serif';
  lines.forEach((l,i)=>{c.fillText('"'+l+(i===lines.length-1?'"':''),cx,420+i*28);});

  // CTA at bottom
  c.font='14px Figtree, sans-serif';c.fillStyle='#8a9aac';
  c.fillText(L('sc_cta'),cx,H-50);

  // Milestone badges
  if(wave>=30){
    c.fillStyle='#FFD600';c.fillRect(cx-140,H-95,280,32);
    c.fillStyle='#1a1a1a';c.font='bold 13px Figtree, sans-serif';
    c.fillText('\u2615 GRATIS-KAFFEE VERDIENT \u2014 Zeig mich an der Theke!',cx,H-76);
  } else if(wave>=20){
    c.fillStyle='rgba(26,26,26,0.08)';c.fillRect(cx-120,H-95,240,28);
    c.fillStyle='#1a1a1a';c.font='12px Figtree, sans-serif';
    c.fillText('\u26a1 '+wave+' Schichten \u2014 Du hast das Zeug zum Barista!',cx,H-78);
  }

  // Decorative emojis scattered
  c.globalAlpha=0.15;c.font='30px serif';
  const emojis=['☕','💨','🍞','⚙️','🧔','🫖','💳','📢','🧹','🤙','🥐','⚡'];
  emojis.forEach((em,i)=>{
    const ex=60+((i*97)%11)/11*(W-120);
    const ey=100+((i*173)%7)/7*(H-200);
    c.fillText(em,ex,ey);
  });
  c.globalAlpha=1;

  // Bottom bar
  c.fillStyle='rgba(26,26,26,0.9)';c.fillRect(0,H-30,W,30);
  c.font='11px Figtree, sans-serif';c.fillStyle='#FFD600';
  c.fillText('⚡ '+L('sc_title')+' · kiezkaffeekraft.de',cx,H-12);

  // Convert and download/share
  cv.toBlob(blob=>{
    if(!blob)return;
    const file=new File([blob],'kraft-td-score.png',{type:'image/png'});
    // Try Web Share API first (mobile)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:L('sc_title'),text:L('sc_survived')+' '+wave+' '+L('sc_shifts')+' · '+L('sc_score')+': '+score}).catch(()=>{});
    } else {
      // Fallback: download
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='kraft-td-score.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    }
  },'image/png');
}

function loop(ts){lastTime=ts;if(gameRunning)update();draw();requestAnimationFrame(loop);}
function startGame(){document.getElementById('ss').classList.add('hid');document.getElementById('go').classList.add('hid');init();gameRunning=true;waveTimer=60;resize();buildPanel();}

renderStartScreen();buildPanel();init();lastTime=performance.now();requestAnimationFrame(loop);draw();

// PWA Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
